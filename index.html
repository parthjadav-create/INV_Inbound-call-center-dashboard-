<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Call Center Analytics Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f7fafc;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text-primary: #1a202c;
    --text-secondary: #4a5568;
    --text-muted: #718096;
    --teal: #0694a2;
    --teal-light: #e6f6f8;
    --teal-dark: #047481;
    --green: #1d9e75;
    --amber: #ba7517;
    --red: #e24b4a;
    --purple: #7f77dd;
    --pink: #d4537e;
    --blue: #378add;
    --olive: #639922;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #047481 0%, #0694a2 50%, #00b5cc 100%);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-icon {
    width: 36px; height: 36px; background: rgba(255,255,255,0.2);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }
  .header-icon svg { width: 20px; height: 20px; fill: white; }
  .header h1 { color: white; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
  .header-sub { color: rgba(255,255,255,0.75); font-size: 12px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .refresh-btn {
    background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: background 0.2s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.25); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #68d391; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Layout ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }

  /* ── Loading / Error ── */
  .loading-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px; color: var(--text-secondary);
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border2);
    border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 15px; font-weight: 500; }
  .loading-sub { font-size: 12px; color: var(--text-muted); }
  .error-card {
    background: #fff5f5; border: 1px solid #fed7d7; border-radius: var(--radius-md);
    padding: 2rem; max-width: 560px; margin: 4rem auto; text-align: center;
  }
  .error-card h3 { color: #c53030; margin-bottom: 8px; }
  .error-card p { color: var(--text-secondary); font-size: 13px; line-height: 1.6; }
  .error-card code { background: #fed7d7; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  /* ── Section label ── */
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--teal-dark);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 1.75rem 0 0.75rem; padding-left: 2px;
  }

  /* ── KPI Cards ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .kpi-card {
    background: var(--surface); border-radius: var(--radius-md);
    border: 1px solid var(--border); padding: 16px 18px;
    box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .kpi-card.c-teal::before    { background: var(--teal); }
  .kpi-card.c-green::before   { background: var(--green); }
  .kpi-card.c-amber::before   { background: var(--amber); }
  .kpi-card.c-red::before     { background: var(--red); }
  .kpi-card.c-purple::before  { background: var(--purple); }
  .kpi-card.c-pink::before    { background: var(--pink); }
  .kpi-card.c-blue::before    { background: var(--blue); }
  .kpi-card.c-olive::before   { background: var(--olive); }
  .kpi-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .kpi-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  /* ── Panel ── */
  .panel {
    background: var(--surface); border-radius: var(--radius-md);
    border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    padding: 18px 20px; margin-bottom: 16px;
  }
  .panel-title {
    font-size: 14px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .panel-title-badge {
    background: var(--teal-light); color: var(--teal-dark);
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 20px; letter-spacing: 0.04em;
  }

  /* ── Grid layouts ── */
  .two-col   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .four-col  { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 1100px) { .four-col { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 900px) { .two-col, .three-col, .four-col { grid-template-columns: 1fr; } }

  /* ── Charts ── */
  .chart-wrap    { position: relative; width: 100%; height: 260px; }
  .chart-wrap-sm { position: relative; width: 100%; height: 200px; }
  .chart-wrap-lg { position: relative; width: 100%; height: 320px; }

  /* ── Legend ── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 12px; font-size: 11px; color: var(--text-secondary);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── Tables ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    background: var(--surface2); color: var(--text-secondary);
    font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border2);
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody td { padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border); color: var(--text-primary); }
  tbody td:first-child { text-align: left; font-weight: 500; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface2); }
  tfoot td {
    padding: 8px 10px; text-align: right; font-weight: 700; font-size: 12px;
    background: var(--teal-light); color: var(--teal-dark); border-top: 2px solid rgba(6,148,162,0.2);
  }
  tfoot td:first-child { text-align: left; }

  /* ── Badges ── */
  .var-badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .var-green  { background: #c6f6d5; color: #276749; }
  .var-amber  { background: #fefcbf; color: #7b6000; }
  .var-orange { background: #feebc8; color: #7b3f00; }
  .var-red    { background: #fed7d7; color: #9b2c2c; }

  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 10px; font-weight: 600; white-space: nowrap;
  }
  .pill-green  { background: #c6f6d5; color: #276749; }
  .pill-red    { background: #fed7d7; color: #9b2c2c; }
  .pill-gray   { background: #e2e8f0; color: #4a5568; }
  .pill-amber  { background: #fefcbf; color: #7b6000; }
  .pill-teal   { background: var(--teal-light); color: var(--teal-dark); }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 12px 16px;
    margin-bottom: 16px; box-shadow: var(--shadow-sm);
  }
  .filter-bar label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .filter-bar select, .filter-bar input {
    border: 1px solid var(--border2); border-radius: 6px;
    padding: 5px 10px; font-size: 12px; color: var(--text-primary);
    background: var(--surface2); cursor: pointer; outline: none;
  }
  .filter-bar select:focus, .filter-bar input:focus { border-color: var(--teal); }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-reset {
    background: var(--teal-light); color: var(--teal-dark); border: 1px solid rgba(6,148,162,0.2);
    border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .filter-reset:hover { background: #bce9ed; }

  /* ── Footer ── */
  .footer {
    text-align: center; font-size: 11px; color: var(--text-muted);
    padding: 1.5rem; border-top: 1px solid var(--border); margin-top: 2rem;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Filter / toolbar bar ── */
  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 12px 16px;
    margin-bottom: 16px; box-shadow: var(--shadow-sm);
    position: sticky; top: 60px; z-index: 90;
  }
  .toolbar-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .toolbar label { font-size: 12px; color: var(--text-secondary); font-weight: 600; white-space: nowrap; }
  .toolbar select, .toolbar input[type="date"] {
    border: 1px solid var(--border2); border-radius: 6px;
    padding: 5px 10px; font-size: 12px; color: var(--text-primary);
    background: var(--surface); cursor: pointer; outline: none; height: 32px;
  }
  .toolbar select:focus, .toolbar input[type="date"]:focus { border-color: var(--teal); box-shadow: 0 0 0 2px rgba(6,148,162,0.15); }
  .toolbar-sep { width: 1px; height: 24px; background: var(--border2); margin: 0 4px; }
  .tb-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent; height: 32px; white-space: nowrap;
    transition: all 0.15s;
  }
  .tb-btn-teal   { background: var(--teal); color: white; border-color: var(--teal-dark); }
  .tb-btn-teal:hover { background: var(--teal-dark); }
  .tb-btn-white  { background: var(--surface); color: var(--text-primary); border-color: var(--border2); }
  .tb-btn-white:hover { background: var(--surface2); }
  .tb-btn-green  { background: #1d9e75; color: white; border-color: #157a5c; }
  .tb-btn-green:hover { background: #157a5c; }
  .tb-btn-red    { background: var(--red); color: white; border-color: #b83535; }
  .tb-btn-red:hover   { background: #b83535; }
  .tb-badge {
    font-size: 10px; background: var(--teal-light); color: var(--teal-dark);
    padding: 1px 6px; border-radius: 10px; font-weight: 700;
  }
  .screenshot-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column; gap: 16px;
  }
  .screenshot-overlay .spin-wrap { text-align: center; color: white; }
  .screenshot-overlay .spinner { border-color: rgba(255,255,255,0.3); border-top-color: white; }
  .screenshot-overlay p { color: rgba(255,255,255,0.85); font-size: 14px; margin-top: 10px; }

  /* ── Bar chart horizontal ── */
  .hbar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; }
  .hbar-label { width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-secondary); flex-shrink: 0; }
  .hbar-track { flex: 1; background: var(--surface2); border-radius: 3px; height: 10px; overflow: hidden; }
  .hbar-fill  { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .hbar-val   { width: 36px; text-align: right; font-weight: 600; color: var(--text-primary); flex-shrink: 0; }
</style>
</head>
<body>

<!-- ══ SCRIPTS ══════════════════════════════════════════════════ -->
<script>
/* ─── CONFIG ─────────────────────────────────────────────────── */
// ✅ Updated to your new Web App URL
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqwR55GP6tVdbnt-UJ3oc8gSTwgsXcdxvPy-jcHfS4PnV2lGfawwRH8D4WLbRuTrY6/exec';

/* ─── COLORS ─────────────────────────────────────────────────── */
const STATUS_COLORS = {
  'Done':            '#1d9e75',
  'Close':           '#ba7517',
  'Not Related':     '#d4537e',
  'Other Language':  '#7f77dd',
  'Physical Visit':  '#378add',
  'Tech Concern':    '#85b7eb',
  'Missed':          '#e24b4a',
  '(none)':          '#888780'
};
const CAT_COLORS = {
  'Issues':          '#7f77dd',
  'Close':           '#ba7517',
  'Training':        '#1d9e75',
  'Physical Visit':  '#639922',
  'Google Meet':     '#17a0ba',
  'WhatsApp Call':   '#d4537e',
  'Whatsapp Call':   '#d4537e',
  '(none)':          '#888780'
};
const INTERACTION_COLORS = {
  'Inbound':         '#0694a2',
  'Outbound':        '#ba7517',
  'Missed':          '#e24b4a',
  '(none)':          '#888780'
};

// ✅ All Status1 values from your sheet
const STATUS_KEYS = ['Done','Close','Not Related','Other Language','Physical Visit','Tech Concern'];
// ✅ All Category values from your sheet
const CAT_KEYS    = ['Issues','Close','Training','Physical Visit','Google Meet','WhatsApp Call'];

/* ─── UTILS ─────────────────────────────────────────────────── */
const fmt = n => (n||0).toLocaleString('en-IN');
const pct = (n,t) => t ? (n/t*100).toFixed(1)+'%' : '0%';

function secsToHMS(s) {
  s = Math.round(Math.abs(s||0));
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  return [h,m,ss].map(x=>String(x).padStart(2,'0')).join(':');
}

function secToMM(s) {
  s = Math.round(Math.abs(s||0));
  const m = Math.floor(s/60), ss = s%60;
  return m + 'm ' + String(ss).padStart(2,'0') + 's';
}

function varBadge(variance) {
  const abs = Math.abs(variance);
  let cls;
  if (abs < 60)        cls = 'var-green';
  else if (abs < 300)  cls = 'var-amber';
  else if (abs < 600)  cls = 'var-orange';
  else                 cls = 'var-red';
  const sign = variance >= 0 ? '+' : '-';
  return `<span class="var-badge ${cls}">${sign}${secsToHMS(abs)}</span>`;
}

// ✅ Fixed: parse "Date (mm/dd/yyyy)" column to extract hour from "Time" column
function parseHour(row) {
  // First try the dedicated Time column
  const timeVal = row['Time'] || '';
  if (timeVal) {
    const m = String(timeVal).match(/(\d{1,2}):(\d{2})/);
    if (m) return parseInt(m[1]);
  }
  // Fallback: try Date column
  const dateVal = row['Date'] || row['Date (mm/dd/yyyy)'] || '';
  if (dateVal) {
    const d = new Date(dateVal);
    if (!isNaN(d)) return d.getHours();
  }
  return -1;
}

// ✅ Fixed: parse "Date (mm/dd/yyyy)" correctly for working-day counting
function parseDate(row) {
  const raw = row['Date (mm/dd/yyyy)'] || row['Date'] || '';
  if (!raw) return null;
  // Apps Script returns yyyy-MM-dd for date cells
  const d = new Date(raw);
  if (!isNaN(d)) return d.toISOString().slice(0,10);
  return null;
}

// ✅ Fixed: Customer Talk Duration comes as seconds (number or string)
function parseDuration(row) {
  const raw = row['Customer Talk Duration'];
  if (raw === '' || raw === null || raw === undefined) return 0;
  const n = parseFloat(raw);
  return isNaN(n) ? 0 : Math.max(0, n);
}

/* ─── FETCH ──────────────────────────────────────────────────── */
let chartInstances = [];
let ALL_ROWS = [];

function destroyCharts() { chartInstances.forEach(c => c.destroy()); chartInstances = []; }

async function loadData() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading data…</div>
    <div class="loading-sub">Please wait while we fetch your call records</div>
  </div>`;
  destroyCharts();

  try {
    const res = await fetch(SCRIPT_URL + '?ts=' + Date.now()); // cache-bust
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();

    let raw;
    try { raw = JSON.parse(text); }
    catch {
      const m = text.match(/\[[\s\S]*\]/);
      if (m) raw = JSON.parse(m[0]);
      else throw new Error('Invalid JSON from Apps Script');
    }

    // ✅ Handles {status, data, count} wrapper from your Apps Script
    const rows = Array.isArray(raw) ? raw : (raw.data || raw.rows || []);
    if (!rows.length) throw new Error('No records returned. Check your sheet name is "Data Sheet".');

    ALL_ROWS = rows;
    renderDashboard(rows);

    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    document.getElementById('footer').style.display = '';
    document.getElementById('footer-text').textContent =
      `${fmt(rows.length)} records processed · Sheet: "Data Sheet" · Last refreshed: ${new Date().toLocaleString()}`;

  } catch(err) {
    app.innerHTML = `<div class="error-card">
      <h3>⚠ Could not load data</h3>
      <p style="margin-top:8px"><strong>${err.message}</strong></p>
      <p style="margin-top:12px">
        Make sure your Apps Script is deployed with <code>Who has access: Anyone</code>.<br>
        Expected sheet name: <code>Data Sheet</code>
      </p>
      <button onclick="loadData()" style="margin-top:16px;padding:8px 20px;border-radius:8px;
        background:#0694a2;color:white;border:none;cursor:pointer;font-size:13px;font-weight:600">
        Retry
      </button>
    </div>`;
  }
}

/* ─── PROCESS DATA ───────────────────────────────────────────── */
function processData(rows) {
  // Per-agent maps
  const agentStatus  = {};   // agent → { Done, Close, ... , total }
  const agentCat     = {};   // agent → { Issues, Close, Training, ... , total }
  const agentTalk    = {};   // agent → { allSecs, allCnt, doneSecs, doneCnt, dates: Set }
  const agentMissed  = {};   // agent → count of Ismissed='TRUE'
  const agentCalledBack = {}; // agent → count of Called_Back='TRUE'

  // Hour-wise
  const hourStatus   = {};   // hh:00 → { Done, Close, ... , total }
  const hourCat      = {};   // hh:00 → { Issues, Close, ... }

  // Category × Status
  const catStatus    = {};   // cat → { Done, Close, ... , total }

  // CallRelatedTo breakdown
  const callRelated  = {};   // callRelatedTo → count

  // Interaction type
  const interactionType = {}; // type → count

  // Hyperpure / Petpooja flags
  let hyperpureLeads = 0, petpoojaOrders = 0;

  // Overall totals
  let totalCalls=0, doneCalls=0, closeCalls=0, notRel=0;
  let issues=0, training=0, physVisit=0;
  let missedCalls=0, calledBackCount=0;

  for (const row of rows) {
    const agent   = (row['Agent Name']      || 'Unknown').trim();
    // ✅ Normalize WhatsApp Call casing
    const rawCat  = (row['Category']        || '').trim();
    const cat     = rawCat.toLowerCase() === 'whatsapp call' ? 'WhatsApp Call' : (rawCat || '(none)');
    const st      = (row['Status1']         || '(none)').trim();
    const itype   = (row['Interaction Type']|| '(none)').trim();
    // ✅ CallRealatedTo — note the typo is in the sheet header
    const crt     = (row['CallRealatedTo']  || '(none)').trim();
    // ✅ Ismissed and Called_Back columns
    const isMissed   = String(row['Ismissed']  || '').trim().toUpperCase() === 'TRUE';
    const calledBack = String(row['Called_Back']|| '').trim().toUpperCase() === 'TRUE';
    // ✅ Hyperpure_Lead and Purchase_by_Petpooja
    const isHP  = String(row['Hyperpure_Lead']       || '').trim().toUpperCase() === 'TRUE';
    const isPP  = String(row['Purchase_by_Petpooja']  || '').trim().toUpperCase() === 'TRUE';

    const dur  = parseDuration(row);
    const hour = parseHour(row);
    const date = parseDate(row);

    totalCalls++;
    if (st === 'Done')          doneCalls++;
    if (st === 'Close')         closeCalls++;
    if (st === 'Not Related')   notRel++;
    if (cat === 'Issues')       issues++;
    if (cat === 'Training')     training++;
    if (cat === 'Physical Visit') physVisit++;
    if (isMissed)               missedCalls++;
    if (calledBack)             calledBackCount++;
    if (isHP)                   hyperpureLeads++;
    if (isPP)                   petpoojaOrders++;

    /* agent × status */
    if (!agentStatus[agent]) {
      agentStatus[agent] = {Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,'Tech Concern':0,total:0};
    }
    agentStatus[agent][st]  = (agentStatus[agent][st]||0)+1;
    agentStatus[agent].total++;

    /* agent × category */
    if (!agentCat[agent]) {
      agentCat[agent] = {Issues:0,Close:0,Training:0,'Physical Visit':0,'Google Meet':0,'WhatsApp Call':0,total:0};
    }
    agentCat[agent][cat] = (agentCat[agent][cat]||0)+1;
    agentCat[agent].total++;

    /* agent talk time + working days */
    if (!agentTalk[agent]) agentTalk[agent] = {allSecs:0,allCnt:0,doneSecs:0,doneCnt:0,dates:new Set()};
    if (dur > 0) {
      agentTalk[agent].allSecs += dur;
      agentTalk[agent].allCnt++;
    }
    if (st === 'Done' && dur > 0) {
      agentTalk[agent].doneSecs += dur;
      agentTalk[agent].doneCnt++;
    }
    // ✅ Working days = unique dates per agent
    if (date) agentTalk[agent].dates.add(date);

    /* agent missed / called back */
    agentMissed[agent]    = (agentMissed[agent]||0)    + (isMissed ? 1 : 0);
    agentCalledBack[agent]= (agentCalledBack[agent]||0) + (calledBack ? 1 : 0);

    /* hour × status & category */
    if (hour >= 0) {
      const hk = String(hour).padStart(2,'0')+':00';
      if (!hourStatus[hk]) hourStatus[hk] = {Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,'Tech Concern':0,total:0};
      hourStatus[hk][st] = (hourStatus[hk][st]||0)+1;
      hourStatus[hk].total++;
      if (!hourCat[hk]) hourCat[hk] = {};
      hourCat[hk][cat]   = (hourCat[hk][cat]||0)+1;
    }

    /* category × status */
    if (!catStatus[cat]) catStatus[cat] = {Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,'Tech Concern':0,total:0};
    catStatus[cat][st] = (catStatus[cat][st]||0)+1;
    catStatus[cat].total++;

    /* CallRealatedTo */
    callRelated[crt] = (callRelated[crt]||0)+1;

    /* Interaction type */
    interactionType[itype] = (interactionType[itype]||0)+1;
  }

  return {
    totalCalls, doneCalls, closeCalls, notRel,
    issues, training, physVisit,
    missedCalls, calledBackCount, hyperpureLeads, petpoojaOrders,
    agentStatus, agentCat, agentTalk, agentMissed, agentCalledBack,
    hourStatus, hourCat, catStatus, callRelated, interactionType
  };
}

  `;

  /* ── CHARTS ── */
  destroyCharts();

  /* Pie — Status */
  const stVals  = STATUS_KEYS.map(k => Object.values(d.agentStatus).reduce((s,a)=>s+(a[k]||0),0));
  const stTotal = stVals.reduce((a,b)=>a+b,0)||1;
  buildLegend('leg-pie-status', STATUS_KEYS, STATUS_COLORS, stVals, stTotal);
  chartInstances.push(new Chart(document.getElementById('pieStatus'), {
    type:'doughnut',
    data:{ labels:STATUS_KEYS, datasets:[{
      data: stVals,
      backgroundColor: STATUS_KEYS.map(k=>STATUS_COLORS[k]),
      borderWidth:2, borderColor:'#fff'
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)} (${pct(ctx.raw,stTotal)})`}}}}
  }));

  /* Pie — Category */
  const ctVals  = CAT_KEYS.map(k => Object.values(d.agentCat).reduce((s,a)=>s+(a[k]||0),0));
  const ctTotal = ctVals.reduce((a,b)=>a+b,0)||1;
  buildLegend('leg-pie-cat', CAT_KEYS, CAT_COLORS, ctVals, ctTotal);
  chartInstances.push(new Chart(document.getElementById('pieCat'), {
    type:'doughnut',
    data:{ labels:CAT_KEYS, datasets:[{
      data: ctVals,
      backgroundColor: CAT_KEYS.map(k=>CAT_COLORS[k]),
      borderWidth:2, borderColor:'#fff'
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)} (${pct(ctx.raw,ctTotal)})`}}}}
  }));

  /* Pie — Interaction Type */
  const itKeys  = itEntries.map(([k])=>k);
  const itVals  = itEntries.map(([,v])=>v);
  const itTotal = itVals.reduce((a,b)=>a+b,0)||1;
  const itColors = ['#0694a2','#ba7517','#e24b4a','#7f77dd','#1d9e75','#888780'];
  buildLegend('leg-pie-itype', itKeys, Object.fromEntries(itKeys.map((k,i)=>[k,itColors[i%itColors.length]])), itVals, itTotal);
  chartInstances.push(new Chart(document.getElementById('pieItype'), {
    type:'doughnut',
    data:{ labels:itKeys, datasets:[{
      data: itVals,
      backgroundColor: itKeys.map((_,i)=>itColors[i%itColors.length]),
      borderWidth:2, borderColor:'#fff'
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)} (${pct(ctx.raw,itTotal)})`}}}}
  }));

  /* Bar — Missed vs Called Back per agent */
  const mAgents = talkAgents.slice(0,15).map(([name])=>name);
  chartInstances.push(new Chart(document.getElementById('missedChart'), {
    type:'bar',
    data:{
      labels: mAgents,
      datasets:[
        { label:'Missed',      data: mAgents.map(n=>d.agentMissed[n]||0),     backgroundColor:'#e24b4a88', borderColor:'#e24b4a', borderWidth:1 },
        { label:'Called Back', data: mAgents.map(n=>d.agentCalledBack[n]||0), backgroundColor:'#1d9e7588', borderColor:'#1d9e75', borderWidth:1 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'top',labels:{font:{size:11},boxWidth:12}}},
      scales:{
        x:{ticks:{font:{size:9},maxRotation:45},grid:{display:false}},
        y:{beginAtZero:true,ticks:{font:{size:10}}}
      }
    }
  }));

  /* Line — Hour × Status */
  if (hasHourData && document.getElementById('hourStatusChart')) {
    buildLegend('leg-hour-status', STATUS_KEYS, STATUS_COLORS);
    chartInstances.push(new Chart(document.getElementById('hourStatusChart'), {
      type:'line',
      data:{
        labels: hLabels,
        datasets: STATUS_KEYS.map(k=>({
          label: k,
          data:  hours.map(h=>(d.hourStatus[h]||{})[k]||0),
          borderColor: STATUS_COLORS[k],
          backgroundColor: STATUS_COLORS[k]+'22',
          borderWidth:2, pointRadius:3, pointHoverRadius:5, tension:0.35, fill:false
        }))
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
        scales:{
          x:{ticks:{maxRotation:45,font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
          y:{beginAtZero:true,ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}}
        }}
    }));

    /* Line — Hour × Category */
    const allHourCatKeys = [...new Set(
      Object.values(d.hourCat).flatMap(h=>Object.keys(h))
    )].filter(k=>k&&k!=='(none)');
    buildLegend('leg-hour-cat', allHourCatKeys, CAT_COLORS);
    chartInstances.push(new Chart(document.getElementById('hourCatChart'), {
      type:'line',
      data:{
        labels: hLabels,
        datasets: allHourCatKeys.map(k=>({
          label: k,
          data:  hours.map(h=>(d.hourCat[h]||{})[k]||0),
          borderColor: CAT_COLORS[k]||'#888',
          backgroundColor: (CAT_COLORS[k]||'#888')+'22',
          borderWidth:2, pointRadius:3, pointHoverRadius:5, tension:0.35, fill:false
        }))
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
        scales:{
          x:{ticks:{maxRotation:45,font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
          y:{beginAtZero:true,ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}}
        }}
    }));
  }
}

/* ─── LEGEND BUILDER ─────────────────────────────────────────── */
function buildLegend(elId, keys, colorMap, vals, total) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = keys.map((k,i)=>{
    const pctStr = (vals && total && vals[i] !== undefined) ? ` ${(vals[i]/total*100).toFixed(1)}%` : '';
    return `<span class="legend-item">
      <span class="legend-dot" style="background:${colorMap[k]||'#888'}"></span>
      ${k}${pctStr}
    </span>`;
  }).join('');
}

/* ─── FILTER STATE ───────────────────────────────────────────── */
let FILTER_STATE = { dateFrom:'', dateTo:'', agent:'', status:'', category:'', itype:'' };

function applyFilters() {
  FILTER_STATE.dateFrom   = document.getElementById('f-date-from').value;
  FILTER_STATE.dateTo     = document.getElementById('f-date-to').value;
  FILTER_STATE.agent      = document.getElementById('f-agent').value;
  FILTER_STATE.status     = document.getElementById('f-status').value;
  FILTER_STATE.category   = document.getElementById('f-category').value;
  FILTER_STATE.itype      = document.getElementById('f-itype').value;

  const filtered = filterRows(ALL_ROWS);

  // Update badge count
  const activeCount = Object.values(FILTER_STATE).filter(v=>v!=='').length;
  const badge = document.getElementById('filter-badge');
  if (activeCount > 0) {
    badge.style.display = 'inline-block';
    badge.textContent = activeCount + ' filter' + (activeCount>1?'s':'') + ' active · ' + filtered.length.toLocaleString('en-IN') + ' records';
  } else {
    badge.style.display = 'none';
  }

  renderDashboard(filtered);
}

function filterRows(rows) {
  return rows.filter(row => {
    const date = parseDate(row);
    if (FILTER_STATE.dateFrom && date && date < FILTER_STATE.dateFrom) return false;
    if (FILTER_STATE.dateTo   && date && date > FILTER_STATE.dateTo)   return false;
    const agent = (row['Agent Name']||'').trim();
    if (FILTER_STATE.agent && agent !== FILTER_STATE.agent) return false;
    const st = (row['Status1']||'').trim();
    if (FILTER_STATE.status && st !== FILTER_STATE.status) return false;
    const rawCat = (row['Category']||'').trim();
    const cat = rawCat.toLowerCase()==='whatsapp call' ? 'WhatsApp Call' : rawCat;
    if (FILTER_STATE.category && cat !== FILTER_STATE.category) return false;
    const itype = (row['Interaction Type']||'').trim();
    if (FILTER_STATE.itype && itype !== FILTER_STATE.itype) return false;
    return true;
  });
}

function resetFilters() {
  ['f-date-from','f-date-to'].forEach(id => { document.getElementById(id).value = ''; });
  ['f-agent','f-status','f-category','f-itype'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  FILTER_STATE = { dateFrom:'', dateTo:'', agent:'', status:'', category:'', itype:'' };
  document.getElementById('filter-badge').style.display = 'none';
  renderDashboard(ALL_ROWS);
}

function populateFilters(rows) {
  const agents     = [...new Set(rows.map(r=>(r['Agent Name']||'').trim()))].filter(Boolean).sort();
  const statuses   = [...new Set(rows.map(r=>(r['Status1']||'').trim()))].filter(Boolean).sort();
  const categories = [...new Set(rows.map(r=>{
    const c=(r['Category']||'').trim();
    return c.toLowerCase()==='whatsapp call'?'WhatsApp Call':c;
  }))].filter(Boolean).sort();
  const itypes     = [...new Set(rows.map(r=>(r['Interaction Type']||'').trim()))].filter(Boolean).sort();

  const fillSelect = (id, options) => {
    const el = document.getElementById(id);
    if (!el) return;
    const cur = el.value;
    // keep first option "All"
    while (el.options.length > 1) el.remove(1);
    options.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      el.appendChild(opt);
    });
    if (options.includes(cur)) el.value = cur;
  };

  fillSelect('f-agent',    agents);
  fillSelect('f-status',   statuses);
  fillSelect('f-category', categories);
  fillSelect('f-itype',    itypes);

  // Set date range defaults from data
  const dates = rows.map(r => parseDate(r)).filter(Boolean).sort();
  if (dates.length) {
    const fromEl = document.getElementById('f-date-from');
    const toEl   = document.getElementById('f-date-to');
    if (!fromEl.value) fromEl.value = dates[0];
    if (!toEl.value)   toEl.value   = dates[dates.length-1];
  }
}

/* ─── EXPORT CSV ─────────────────────────────────────────────── */
function exportCSV() {
  const filtered = filterRows(ALL_ROWS);
  if (!filtered.length) { alert('No data to export.'); return; }

  const headers = Object.keys(filtered[0]);
  const csvRows = [
    headers.join(','),
    ...filtered.map(row =>
      headers.map(h => {
        const val = String(row[h] ?? '').replace(/"/g, '""');
        return val.includes(',') || val.includes('"') || val.includes('\n') ? `"${val}"` : val;
      }).join(',')
    )
  ];

  const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const now  = new Date();
  const ts   = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  a.href     = url;
  a.download = `call_center_data_${ts}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ─── SCREENSHOT (long page) ──────────────────────────────────── */
function takeScreenshot() {
  // Show overlay
  const overlay = document.createElement('div');
  overlay.className = 'screenshot-overlay';
  overlay.innerHTML = '<div class="spin-wrap"><div class="spinner"></div><p>Capturing full dashboard…<br><small style="opacity:0.7">This may take a few seconds</small></p></div>';
  document.body.appendChild(overlay);

  // Scroll to top before capture
  window.scrollTo(0, 0);

  // Small delay to let overlay render
  setTimeout(() => {
    const target = document.getElementById('app');
    html2canvas(target, {
      scale: 1.5,
      useCORS: true,
      allowTaint: true,
      scrollX: 0,
      scrollY: 0,
      windowWidth: document.documentElement.scrollWidth,
      windowHeight: document.documentElement.scrollHeight,
      logging: false,
      backgroundColor: '#f0f4f8',
      onclone: (clonedDoc) => {
        // Make all sections visible in clone
        clonedDoc.querySelectorAll('.panel, .kpi-grid, .two-col, .three-col').forEach(el => {
          el.style.pageBreakInside = 'avoid';
        });
      }
    }).then(canvas => {
      document.body.removeChild(overlay);
      const link = document.createElement('a');
      const now  = new Date();
      const ts   = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
      link.download = `dashboard_screenshot_${ts}.png`;
      link.href = canvas.toDataURL('image/png', 0.95);
      link.click();
    }).catch(err => {
      document.body.removeChild(overlay);
      alert('Screenshot failed: ' + err.message);
    });
  }, 300);
}
