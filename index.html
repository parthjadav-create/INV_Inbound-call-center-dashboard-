<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Call Center Analytics Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f7fafc;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text-primary: #1a202c;
    --text-secondary: #4a5568;
    --text-muted: #718096;
    --teal: #0694a2;
    --teal-light: #e6f6f8;
    --teal-dark: #047481;
    --green: #1d9e75;
    --amber: #ba7517;
    --red: #e24b4a;
    --purple: #7f77dd;
    --pink: #d4537e;
    --blue: #378add;
    --olive: #639922;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #047481 0%, #0694a2 50%, #00b5cc 100%);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-icon {
    width: 36px; height: 36px; background: rgba(255,255,255,0.2);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }
  .header-icon svg { width: 20px; height: 20px; fill: white; }
  .header h1 { color: white; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
  .header-sub { color: rgba(255,255,255,0.75); font-size: 12px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .refresh-btn {
    background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: background 0.2s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.25); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #68d391; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Layout ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }

  /* ── Loading / Error ── */
  .loading-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px; color: var(--text-secondary);
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border2);
    border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 15px; font-weight: 500; }
  .loading-sub { font-size: 12px; color: var(--text-muted); }
  .error-card {
    background: #fff5f5; border: 1px solid #fed7d7; border-radius: var(--radius-md);
    padding: 2rem; max-width: 560px; margin: 4rem auto; text-align: center;
  }
  .error-card h3 { color: #c53030; margin-bottom: 8px; }
  .error-card p { color: var(--text-secondary); font-size: 13px; line-height: 1.6; }
  .error-card code { background: #fed7d7; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  /* ── Section label ── */
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--teal-dark);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 1.75rem 0 0.75rem; padding-left: 2px;
  }

  /* ── KPI Cards ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .kpi-card {
    background: var(--surface); border-radius: var(--radius-md);
    border: 1px solid var(--border); padding: 16px 18px;
    box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--teal);
  }
  .kpi-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .kpi-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  /* ── Panel ── */
  .panel {
    background: var(--surface); border-radius: var(--radius-md);
    border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    padding: 18px 20px; margin-bottom: 16px;
  }
  .panel-title {
    font-size: 14px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .panel-title-badge {
    background: var(--teal-light); color: var(--teal-dark);
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 20px; letter-spacing: 0.04em;
  }

  /* ── Grid layouts ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .two-col, .three-col { grid-template-columns: 1fr; } }

  /* ── Charts ── */
  .chart-wrap { position: relative; width: 100%; height: 260px; }
  .chart-wrap-sm { position: relative; width: 100%; height: 200px; }
  .chart-wrap-lg { position: relative; width: 100%; height: 320px; }

  /* ── Legend ── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 12px; font-size: 11px; color: var(--text-secondary);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── Tables ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    background: var(--surface2); color: var(--text-secondary);
    font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border2);
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody td { padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border); color: var(--text-primary); }
  tbody td:first-child { text-align: left; font-weight: 500; }
  tbody tr:hover td { background: var(--surface2); }
  tfoot td {
    padding: 8px 10px; text-align: right; font-weight: 700; font-size: 12px;
    background: var(--teal-light); color: var(--teal-dark); border-top: 2px solid rgba(6,148,162,0.2);
  }
  tfoot td:first-child { text-align: left; }

  /* ── Talk time variance badges ── */
  .var-badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .var-green { background: #c6f6d5; color: #276749; }
  .var-amber { background: #fefcbf; color: #7b6000; }
  .var-orange { background: #feebc8; color: #7b3f00; }
  .var-red { background: #fed7d7; color: #9b2c2c; }

  /* ── Footer ── */
  .footer {
    text-align: center; font-size: 11px; color: var(--text-muted);
    padding: 1.5rem; border-top: 1px solid var(--border); margin-top: 2rem;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════════ -->
<header class="header">
  <div class="header-brand">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
    </div>
    <div>
      <h1>Call Center Analytics</h1>
      <div class="header-sub">Monthly Performance Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot" title="Live data"></div>
    <button class="refresh-btn" onclick="loadData()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Refresh
    </button>
    <div id="last-updated" style="font-size:11px;color:rgba(255,255,255,0.65);"></div>
  </div>
</header>

<!-- ══ MAIN ════════════════════════════════════════════════════ -->
<main class="main" id="app">
  <div id="filter-root"></div>
  <div id="dash-root">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Connecting to Google Sheets…</div>
    <div class="loading-sub">Fetching call records and computing metrics</div>
  </div>
  </div>
</main>

<footer class="footer" id="footer" style="display:none">
  <span id="footer-text"></span>
</footer>

<!-- ══ SCRIPTS ══════════════════════════════════════════════════ -->
<script>
/* ─── CONFIG ────────────────────────────────────────────────── */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBZVvGUCw2bS-kgyjY9JlFsMIj21vejB8Yhm62oKFZPY64E0gWYdPHZdcFnJvVoYCE/exec';

/* ─── COLORS ─────────────────────────────────────────────────── */
const STATUS_COLORS = {
  'Done':           '#1d9e75',
  'Close':          '#ba7517',
  'Not Related':    '#d4537e',
  'Other Language': '#7f77dd',
  'Physical Visit': '#63c090',
  'Tech Concern':   '#85b7eb'
};
const CAT_COLORS = {
  'Issues':        '#7f77dd',
  'Close':         '#ba7517',
  'Training':      '#1d9e75',
  'Physical Visit':'#639922',
  'Google Meet':   '#17a0ba',
  'WhatsApp Call': '#d4537e',
  'Whatsapp Call': '#d4537e',
  'null':          '#888780'
};
const STATUS_KEYS = ['Done','Close','Not Related','Other Language','Physical Visit','Tech Concern'];
const CAT_KEYS    = ['Issues','Close','Training','Physical Visit','Google Meet','WhatsApp Call'];

/* ─── UTILS ─────────────────────────────────────────────────── */
const fmt   = n => (n||0).toLocaleString('en-IN');
const pct   = (n,t) => t ? (n/t*100).toFixed(1)+'%' : '0%';

function secsToHMS(s) {
  s = Math.round(Math.abs(s||0));
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  return [h,m,ss].map(x=>String(x).padStart(2,'0')).join(':');
}

function varBadge(variance) {
  const abs = Math.abs(variance);
  let cls;
  if (abs < 1800)       cls = 'var-green';
  else if (abs < 3600)  cls = 'var-amber';
  else if (abs < 5400)  cls = 'var-orange';
  else                  cls = 'var-red';
  const sign = variance >= 0 ? '+' : '-';
  return `<span class="var-badge ${cls}">${sign}${secsToHMS(abs)}</span>`;
}

/* ─── FETCH ──────────────────────────────────────────────────── */
let chartInstances = [];
function destroyCharts() { chartInstances.forEach(c => c.destroy()); chartInstances = []; }

async function loadData() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading data…</div>
    <div class="loading-sub">Please wait</div>
  </div>`;
  destroyCharts();

  try {
    const res = await fetch(SCRIPT_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    let raw;
    try { raw = JSON.parse(text); }
    catch { const m = text.match(/\[[\s\S]*\]/); if(m) raw=JSON.parse(m[0]); else throw new Error('Invalid JSON'); }

    const rows = Array.isArray(raw) ? raw : (raw.data || raw.rows || []);
    if (!rows.length) throw new Error('No records returned from Apps Script.');

    ALL_DATA = rows;
    renderFilterBar();
    applyFilters();

    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    document.getElementById('footer').style.display = '';
    document.getElementById('footer-text').textContent =
      `${fmt(rows.length)} records processed · Data source: Google Apps Script · Last refreshed: ${new Date().toLocaleString()}`;

  } catch(err) {
    const app = document.getElementById('app');
    app.innerHTML = `<div class="error-card">
      <h3>⚠ Could not load data</h3>
      <p style="margin-top:8px"><strong>${err.message}</strong></p>
      <p style="margin-top:12px">Please ensure your Apps Script is deployed with access set to
      <code>Anyone</code>, and that the response is a JSON array with headers:<br>
      <code>Interaction Type</code>, <code>Agent Name</code>, <code>Category</code>,
      <code>Status1</code>, <code>Customer Talk Duration</code></p>
      <button onclick="loadData()" style="margin-top:16px;padding:8px 20px;border-radius:8px;
        background:#0694a2;color:white;border:none;cursor:pointer;font-size:13px;font-weight:600">
        Retry
      </button>
    </div>`;
  }
}

function renderFilterBar() {
  const filterRoot = document.getElementById('filter-root');
  const agents = [...new Set(ALL_DATA.map(r => (r['Agent Name'] || 'Unknown').trim()))].sort();
  
  filterRoot.innerHTML = `
    <div class="filter-bar">
      <div class="filter-group">
        <label>Agent</label>
        <div style="display:flex; flex-direction:column; gap:4px;">
          <input type="text" id="f-agent-search" placeholder="Search agent..." oninput="updateAgentDropdown(this.value)" style="width:140px;">
          <select id="f-agent" style="width:140px;">
            <option value="">All Agents</option>
            ${agents.map(a => `<option value="${a}">${a}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="filter-group">
        <label>RID</label>
        <input type="text" id="f-rid" placeholder="Search RID...">
      </div>
      <div class="filter-group">
        <label>From</label>
        <input type="date" id="f-from">
      </div>
      <div class="filter-group">
        <label>To</label>
        <input type="date" id="f-to">
      </div>
      <div class="filter-group">
        <label>Presets</label>
        <select id="f-preset" onchange="setDatePreset(this.value)">
          <option value="">Custom</option>
          <option value="today">Today</option>
          <option value="7days">Last 7 Days</option>
          <option value="month">This Month</option>
        </select>
      </div>
      <div style="display:flex; gap:8px; margin-left:auto;">
        <button class="filter-reset" style="background:var(--teal); color:white" onclick="applyFilters()">Apply</button>
        <button class="filter-reset" onclick="resetFilters()">Reset</button>
      </div>
    </div>
  `;
}

function updateAgentDropdown(query) {
  const select = document.getElementById('f-agent');
  const agents = [...new Set(ALL_DATA.map(r => (r['Agent Name'] || 'Unknown').trim()))].sort();
  const filtered = agents.filter(a => a.toLowerCase().includes(query.toLowerCase()));
  
  let html = '<option value="">All Agents</option>';
  filtered.forEach(a => {
    html += `<option value="${a}">${a}</option>`;
  });
  select.innerHTML = html;
}

function setDatePreset(type) {
  if (!type) return;
  const now = new Date();
  const f = d => {
    const y = d.getFullYear(), m = ('0'+(d.getMonth()+1)).slice(-2), day = ('0'+d.getDate()).slice(-2);
    return `${y}-${m}-${day}`;
  };
  let from = '', to = f(now);
  if (type === 'today') from = to;
  else if (type === '7days') {
    const start = new Date(); start.setDate(now.getDate() - 7); from = f(start);
  } else if (type === 'month') {
    const start = new Date(now.getFullYear(), now.getMonth(), 1); from = f(start);
  }
  document.getElementById('f-from').value = from;
  document.getElementById('f-to').value = to;
  applyFilters();
}

function applyFilters() {
  const agent = document.getElementById('f-agent').value;
  const rid = document.getElementById('f-rid').value.trim().toLowerCase();
  const fromDate = document.getElementById('f-from').value;
  const toDate = document.getElementById('f-to').value;

  const filtered = ALL_DATA.filter(row => {
    if (agent && (row['Agent Name'] || 'Unknown').trim() !== agent) return false;
    
    const rowRid = String(row['RID'] || row['Customer Number'] || '').toLowerCase();
    if (rid && !rowRid.includes(rid)) return false;
    
    const dateVal = row['Date']||row['Date (mm/dd/yyyy)']||row['DateTime']||row['Timestamp']||'';
    if (fromDate || toDate) {
      const d = new Date(dateVal);
      if (!isNaN(d.getTime())) {
        const rowDate = d.toISOString().slice(0,10);
        if (fromDate && rowDate < fromDate) return false;
        if (toDate && rowDate > toDate) return false;
      }
    }
    return true;
  });

  renderDashboard(processData(filtered), filtered.length);
}

function resetFilters() {
  document.getElementById('f-agent').value = "";
  if (document.getElementById('f-agent-search')) document.getElementById('f-agent-search').value = "";
  document.getElementById('f-rid').value = "";
  document.getElementById('f-from').value = "";
  document.getElementById('f-to').value = "";
  if (document.getElementById('f-preset')) document.getElementById('f-preset').value = "";
  applyFilters();
}

/* ─── PROCESS DATA ───────────────────────────────────────────── */
function processData(rows) {
  const agentStatus  = {};
  const agentCat     = {};
  const agentTalk    = {};
  const hourStatus   = {};
  const hourCat      = {};
  const catStatus    = {};
  let totalCalls=0, doneCalls=0, closeCalls=0, notRel=0, issues=0, training=0, physVisit=0;

  for (const row of rows) {
    const agent = (row['Agent Name']||'Unknown').trim();
    const cat   = (row['Category']||'(none)').trim();
    const st    = (row['Status1']||'(none)').trim();
    const dur   = parseFloat(row['Customer Talk Duration']||0);

    // Try to extract hour from any date-like column
    let hour = -1;
    const dateVal = row['Date']||row['date']||row['DateTime']||row['Timestamp']||row['timestamp']||'';
    if (dateVal) { const d = new Date(dateVal); if (!isNaN(d)) hour = d.getHours(); }

    totalCalls++;
    if (st==='Done')        doneCalls++;
    if (st==='Close')       closeCalls++;
    if (st==='Not Related') notRel++;
    if (cat==='Issues')     issues++;
    if (cat==='Training')   training++;
    if (cat==='Physical Visit') physVisit++;

    /* agent × status */
    if (!agentStatus[agent]) agentStatus[agent] = {Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,'Tech Concern':0,total:0};
    agentStatus[agent][st]  = (agentStatus[agent][st]||0)+1;
    agentStatus[agent].total++;

    /* agent × category */
    if (!agentCat[agent]) agentCat[agent] = {Issues:0,Close:0,Training:0,'Physical Visit':0,'Google Meet':0,'WhatsApp Call':0,total:0};
    agentCat[agent][cat]    = (agentCat[agent][cat]||0)+1;
    agentCat[agent].total++;

    /* talk time */
    if (!agentTalk[agent]) agentTalk[agent] = {allSecs:0,allCnt:0,doneSecs:0,doneCnt:0};
    if (!isNaN(dur) && dur > 0) {
      agentTalk[agent].allSecs += dur;
      agentTalk[agent].allCnt++;
      if (st==='Done') { agentTalk[agent].doneSecs += dur; agentTalk[agent].doneCnt++; }
    }

    /* hour × status & category */
    if (hour >= 0) {
      const hk = String(hour).padStart(2,'0')+':00';
      if (!hourStatus[hk]) hourStatus[hk] = {Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,'Tech Concern':0,total:0};
      hourStatus[hk][st]  = (hourStatus[hk][st]||0)+1;
      hourStatus[hk].total++;
      if (!hourCat[hk]) hourCat[hk] = {};
      hourCat[hk][cat]    = (hourCat[hk][cat]||0)+1;
    }

    /* category × status */
    if (!catStatus[cat]) catStatus[cat] = {Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,total:0};
    catStatus[cat][st]  = (catStatus[cat][st]||0)+1;
    catStatus[cat].total++;
  }

  return { totalCalls, doneCalls, closeCalls, notRel, issues, training, physVisit,
    agentStatus, agentCat, agentTalk, hourStatus, hourCat, catStatus };
}

/* ─── RENDER DASHBOARD ───────────────────────────────────────── */
function renderDashboard(d, rowCount) {
  const dashRoot = document.getElementById('dash-root');

  /* totals for category columns */
  const statusTotals = STATUS_KEYS.map(k =>
    Object.values(d.agentStatus).reduce((s,a)=>s+(a[k]||0),0));
  const catTotals = CAT_KEYS.map(k =>
    Object.values(d.agentCat).reduce((s,a)=>s+(a[k]||0),0));

  /* top agents */
  const topAgentsByTotal = Object.entries(d.agentStatus).sort((a,b)=>b[1].total-a[1].total).slice(0,20);
  const topAgentsByCat   = Object.entries(d.agentCat).sort((a,b)=>b[1].total-a[1].total).slice(0,20);
  const talkAgents       = Object.entries(d.agentTalk)
    .filter(([,v])=>v.allCnt>0).sort((a,b)=>b[1].allCnt-a[1].allCnt).slice(0,20);

  const hasHourData = Object.keys(d.hourStatus).length > 0;
  const hours = Object.keys(d.hourStatus).sort();
  const hLabels = hours.map(h=>{
    const next = (parseInt(h)+1)%24;
    return h.replace(':00','') + ':00 – ' + String(next).padStart(2,'0') + ':00';
  });

  /* ── KPIs ── */
  const kpiData = [
    { label:'Total Calls',    value: fmt(d.totalCalls),  meta: '100% of all interactions' },
    { label:'Done Calls',     value: fmt(d.doneCalls),   meta: pct(d.doneCalls,d.totalCalls)+' of total' },
    { label:'Close Calls',    value: fmt(d.closeCalls),  meta: pct(d.closeCalls,d.totalCalls)+' of total' },
    { label:'Not Related',    value: fmt(d.notRel),      meta: pct(d.notRel,d.totalCalls)+' of total' },
    { label:'Total Issues',   value: fmt(d.issues),      meta: pct(d.issues,d.totalCalls)+' of total' },
    { label:'Total Training', value: fmt(d.training),    meta: pct(d.training,d.totalCalls)+' of total' },
    { label:'Physical Visit', value: fmt(d.physVisit),   meta: pct(d.physVisit,d.totalCalls)+' of total' },
  ];

  /* ── Category-status table rows ── */
  const catStatusKeys = Object.keys(d.catStatus);
  const catTotRow = catStatusKeys.reduce((acc,cat)=>{
    const v=d.catStatus[cat];
    acc.Done+=(v.Done||0); acc.Close+=(v.Close||0);
    acc['Not Related']+=(v['Not Related']||0); acc['Other Language']+=(v['Other Language']||0);
    acc['Physical Visit']+=(v['Physical Visit']||0); acc.total+=v.total;
    return acc;
  },{Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,total:0});

  /* ── Agent-status table totals ── */
  const asTot={Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,'Tech Concern':0,total:0};
  for(const [,v] of topAgentsByTotal) for(const k of Object.keys(asTot)) asTot[k]=(asTot[k]||0)+(v[k]||0);

  /* ── Agent-category table totals ── */
  const acTot={Issues:0,Close:0,Training:0,'Physical Visit':0,'Google Meet':0,'WhatsApp Call':0,total:0};
  for(const [,v] of topAgentsByCat) for(const k of Object.keys(acTot)) acTot[k]=(acTot[k]||0)+(v[k]||0);

  /* ── BUILD HTML ── */
  dashRoot.innerHTML = `
    <!-- KPIs -->
    <p class="section-label">KPI Summary</p>
    <div class="kpi-grid">
      ${kpiData.map(k=>`<div class="kpi-card">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-value">${k.value}</div>
        <div class="kpi-meta">${k.meta}</div>
      </div>`).join('')}
    </div>

    <!-- Pie charts -->
    <p class="section-label">Month activity breakdown</p>
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">By Status <span class="panel-title-badge">Status1</span></div>
        <div class="legend" id="leg-pie-status"></div>
        <div class="chart-wrap-sm"><canvas id="pieStatus" role="img" aria-label="Pie chart of month activity by status"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">By Category <span class="panel-title-badge">Category</span></div>
        <div class="legend" id="leg-pie-cat"></div>
        <div class="chart-wrap-sm"><canvas id="pieCat" role="img" aria-label="Pie chart of month activity by category"></canvas></div>
      </div>
    </div>

    <!-- Category-wise status table -->
    <p class="section-label">Category wise status</p>
    <div class="panel">
      <div class="panel-title">Category × Status breakdown</div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Category</th><th>Done</th><th>Close</th><th>Not Related</th><th>Other Language</th><th>Physical Visit</th><th>Total</th>
        </tr></thead>
        <tbody>
          ${catStatusKeys.map(cat=>{const v=d.catStatus[cat];return`<tr>
            <td>${cat}</td>
            <td>${fmt(v.Done||0)}</td><td>${fmt(v.Close||0)}</td>
            <td>${fmt(v['Not Related']||0)}</td><td>${fmt(v['Other Language']||0)}</td>
            <td>${fmt(v['Physical Visit']||0)}</td><td>${fmt(v.total)}</td>
          </tr>`;}).join('')}
        </tbody>
        <tfoot><tr>
          <td>Total</td><td>${fmt(catTotRow.Done)}</td><td>${fmt(catTotRow.Close)}</td>
          <td>${fmt(catTotRow['Not Related'])}</td><td>${fmt(catTotRow['Other Language'])}</td>
          <td>${fmt(catTotRow['Physical Visit'])}</td><td>${fmt(catTotRow.total)}</td>
        </tr></tfoot>
      </table></div>
    </div>

    <!-- Hour-wise charts -->
    <p class="section-label">Hour wise call trends</p>
    ${hasHourData ? `
    <div class="panel">
      <div class="panel-title">This month's hour wise calls — by status</div>
      <div class="legend" id="leg-hour-status"></div>
      <div class="chart-wrap-lg"><canvas id="hourStatusChart" role="img" aria-label="Line chart of hour wise calls by status"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-title">This month's hour wise calls — by category</div>
      <div class="legend" id="leg-hour-cat"></div>
      <div class="chart-wrap-lg"><canvas id="hourCatChart" role="img" aria-label="Line chart of hour wise calls by category"></canvas></div>
    </div>` : `<div class="panel"><p style="color:#718096;font-size:13px;padding:1rem 0">
      No date/time column detected. Add a <strong>Date</strong> or <strong>Timestamp</strong> column to your sheet to enable hourly trend charts.
    </p></div>`}

    <!-- Agent × Status table -->
    <p class="section-label">Month activity — agent performance by status</p>
    <div class="panel">
      <div class="panel-title">Agent × Status <span class="panel-title-badge">Status1 / Status1</span></div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Agent Name</th><th>Done</th><th>Close</th><th>Not Related</th><th>Other Lang.</th><th>Phys. Visit</th><th>Tech Concern</th><th>Total</th>
        </tr></thead>
        <tbody>
          ${topAgentsByTotal.map(([name,v])=>`<tr>
            <td>${name}</td>
            <td>${fmt(v.Done)}</td><td>${fmt(v.Close)}</td>
            <td>${fmt(v['Not Related'])}</td><td>${fmt(v['Other Language']||0)}</td>
            <td>${fmt(v['Physical Visit']||0)}</td><td>${fmt(v['Tech Concern']||0)}</td>
            <td>${fmt(v.total)}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td>Total</td><td>${fmt(asTot.Done)}</td><td>${fmt(asTot.Close)}</td>
          <td>${fmt(asTot['Not Related'])}</td><td>${fmt(asTot['Other Language'])}</td>
          <td>${fmt(asTot['Physical Visit'])}</td><td>${fmt(asTot['Tech Concern'])}</td>
          <td>${fmt(asTot.total)}</td>
        </tr></tfoot>
      </table></div>
    </div>

    <!-- Agent × Category table -->
    <p class="section-label">Month activity — agent performance by category</p>
    <div class="panel">
      <div class="panel-title">Agent × Category <span class="panel-title-badge">Category / Status1</span></div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Agent Name</th><th>Issues</th><th>Close</th><th>Training</th><th>Phys. Visit</th><th>Google Meet</th><th>WA Call</th><th>Total</th>
        </tr></thead>
        <tbody>
          ${topAgentsByCat.map(([name,v])=>`<tr>
            <td>${name}</td>
            <td>${fmt(v.Issues||0)}</td><td>${fmt(v.Close||0)}</td>
            <td>${fmt(v.Training||0)}</td><td>${fmt(v['Physical Visit']||0)}</td>
            <td>${fmt(v['Google Meet']||0)}</td><td>${fmt(v['WhatsApp Call']||v['Whatsapp Call']||0)}</td>
            <td>${fmt(v.total)}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td>Total</td><td>${fmt(acTot.Issues)}</td><td>${fmt(acTot.Close)}</td>
          <td>${fmt(acTot.Training)}</td><td>${fmt(acTot['Physical Visit'])}</td>
          <td>${fmt(acTot['Google Meet'])}</td><td>${fmt(acTot['WhatsApp Call'])}</td>
          <td>${fmt(acTot.total)}</td>
        </tr></tfoot>
      </table></div>
    </div>

    <!-- Talk time analysis -->
    <p class="section-label">Talk time analysis</p>
    <div class="two-col">
      <div class="panel">
        <div class="panel-title">Working days (dialer)</div>
        <div class="table-wrap"><table>
          <thead><tr><th>Agent</th><th>Working Days</th></tr></thead>
          <tbody>
            ${talkAgents.map(([name,v])=>`<tr>
              <td>${name}</td><td>${v.allCnt > 0 ? '—' : '0'}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>
        <p style="font-size:11px;color:#718096;margin-top:10px">Working days require a date column in your dataset.</p>
      </div>
      <div class="panel">
        <div class="panel-title">Avg vs Done talk time + variance</div>
        <div class="table-wrap"><table>
          <thead><tr><th>Agent</th><th>Avg Talk Time</th><th>Done Talk Time</th><th>Variance</th></tr></thead>
          <tbody>
            ${talkAgents.map(([name,v])=>{
              const avg  = v.allCnt  > 0 ? v.allSecs  / v.allCnt  : 0;
              const done = v.doneCnt > 0 ? v.doneSecs / v.doneCnt : 0;
              const variance = done - avg;
              return `<tr>
                <td>${name}</td>
                <td>${secsToHMS(avg)}</td>
                <td>${secsToHMS(done)}</td>
                <td>${varBadge(variance)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table></div>
      </div>
    </div>
  `;

  /* ── RENDER CHARTS ── */
  destroyCharts();

  /* Pie — Status */
  const stVals = STATUS_KEYS.map(k =>
    Object.values(d.agentStatus).reduce((s,a)=>s+(a[k]||0),0));
  const stTotal = stVals.reduce((a,b)=>a+b,0)||1;
  buildLegend('leg-pie-status', STATUS_KEYS, STATUS_COLORS, stVals, stTotal);
  chartInstances.push(new Chart(document.getElementById('pieStatus'), {
    type:'doughnut',
    data:{ labels:STATUS_KEYS, datasets:[{data:stVals, backgroundColor:STATUS_KEYS.map(k=>STATUS_COLORS[k]), borderWidth:2, borderColor:'#fff'}] },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)} (${pct(ctx.raw,stTotal)})`}}}}
  }));

  /* Pie — Category */
  const ctVals = CAT_KEYS.map(k =>
    Object.values(d.agentCat).reduce((s,a)=>s+(a[k]||0),0));
  const ctTotal = ctVals.reduce((a,b)=>a+b,0)||1;
  buildLegend('leg-pie-cat', CAT_KEYS, CAT_COLORS, ctVals, ctTotal);
  chartInstances.push(new Chart(document.getElementById('pieCat'), {
    type:'doughnut',
    data:{ labels:CAT_KEYS, datasets:[{data:ctVals, backgroundColor:CAT_KEYS.map(k=>CAT_COLORS[k]), borderWidth:2, borderColor:'#fff'}] },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)} (${pct(ctx.raw,ctTotal)})`}}}}
  }));

  /* Line — Hour × Status */
  if (hasHourData && document.getElementById('hourStatusChart')) {
    buildLegend('leg-hour-status', STATUS_KEYS, STATUS_COLORS);
    chartInstances.push(new Chart(document.getElementById('hourStatusChart'), {
      type:'line',
      data:{
        labels: hLabels,
        datasets: STATUS_KEYS.map(k=>({
          label:k,
          data: hours.map(h=>(d.hourStatus[h]||{})[k]||0),
          borderColor: STATUS_COLORS[k],
          backgroundColor: STATUS_COLORS[k]+'18',
          borderWidth:2, pointRadius:4, pointHoverRadius:6, tension:0.35, fill:false
        }))
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
        scales:{x:{ticks:{maxRotation:45,font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
                y:{beginAtZero:true,ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}}}}
    }));

    /* Line — Hour × Category */
    const allHourCatKeys = [...new Set(Object.values(d.hourCat).flatMap(h=>Object.keys(h)))].filter(k=>k&&k!=='(none)');
    buildLegend('leg-hour-cat', allHourCatKeys, CAT_COLORS);
    chartInstances.push(new Chart(document.getElementById('hourCatChart'), {
      type:'line',
      data:{
        labels: hLabels,
        datasets: allHourCatKeys.map(k=>({
          label:k,
          data: hours.map(h=>(d.hourCat[h]||{})[k]||0),
          borderColor: CAT_COLORS[k]||'#888',
          backgroundColor: (CAT_COLORS[k]||'#888')+'18',
          borderWidth:2, pointRadius:4, pointHoverRadius:6, tension:0.35, fill:false
        }))
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
        scales:{x:{ticks:{maxRotation:45,font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
                y:{beginAtZero:true,ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}}}}
    }));
  }
}

/* ─── LEGEND BUILDER ─────────────────────────────────────────── */
function buildLegend(elId, keys, colorMap, vals, total) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = keys.map((k,i)=>{
    const pctStr = vals && total ? ` ${(vals[i]/total*100).toFixed(1)}%` : '';
    return `<span class="legend-item">
      <span class="legend-dot" style="background:${colorMap[k]||'#888'}"></span>
      ${k}${pctStr}
    </span>`;
  }).join('');
}

/* ─── BOOT ───────────────────────────────────────────────────── */
loadData();
</script>
</body>
</html>
