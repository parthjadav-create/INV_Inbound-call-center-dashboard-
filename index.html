<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Call Center Analytics Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f7fafc;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text-primary: #1a202c;
    --text-secondary: #4a5568;
    --text-muted: #718096;
    --teal: #0694a2;
    --teal-light: #e6f6f8;
    --teal-dark: #047481;
    --green: #1d9e75;
    --amber: #ba7517;
    --red: #e24b4a;
    --purple: #7f77dd;
    --pink: #d4537e;
    --blue: #378add;
    --olive: #639922;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #047481 0%, #0694a2 50%, #00b5cc 100%);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-icon {
    width: 36px; height: 36px; background: rgba(255,255,255,0.2);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }
  .header-icon svg { width: 20px; height: 20px; fill: white; }
  .header h1 { color: white; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
  .header-sub { color: rgba(255,255,255,0.75); font-size: 12px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .refresh-btn {
    background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: background 0.2s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.25); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #68d391; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Layout ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }

  /* ── Loading / Error ── */
  .loading-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px; color: var(--text-secondary);
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border2);
    border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 15px; font-weight: 500; }
  .loading-sub { font-size: 12px; color: var(--text-muted); }
  .error-card {
    background: #fff5f5; border: 1px solid #fed7d7; border-radius: var(--radius-md);
    padding: 2rem; max-width: 560px; margin: 4rem auto; text-align: center;
  }
  .error-card h3 { color: #c53030; margin-bottom: 8px; }
  .error-card p { color: var(--text-secondary); font-size: 13px; line-height: 1.6; }
  .error-card code { background: #fed7d7; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  /* ── Section label ── */
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--teal-dark);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 1.75rem 0 0.75rem; padding-left: 2px;
  }

  /* ── KPI Cards ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .kpi-card {
    background: var(--surface); border-radius: var(--radius-md);
    border: 1px solid var(--border); padding: 16px 18px;
    box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .kpi-card.c-teal::before    { background: var(--teal); }
  .kpi-card.c-green::before   { background: var(--green); }
  .kpi-card.c-amber::before   { background: var(--amber); }
  .kpi-card.c-red::before     { background: var(--red); }
  .kpi-card.c-purple::before  { background: var(--purple); }
  .kpi-card.c-pink::before    { background: var(--pink); }
  .kpi-card.c-blue::before    { background: var(--blue); }
  .kpi-card.c-olive::before   { background: var(--olive); }
  .kpi-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .kpi-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  /* ── Panel ── */
  .panel {
    background: var(--surface); border-radius: var(--radius-md);
    border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    padding: 18px 20px; margin-bottom: 16px;
  }
  .panel-title {
    font-size: 14px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .panel-title-badge {
    background: var(--teal-light); color: var(--teal-dark);
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 20px; letter-spacing: 0.04em;
  }

  /* ── Grid layouts ── */
  .two-col   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .four-col  { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 1100px) { .four-col { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 900px) { .two-col, .three-col, .four-col { grid-template-columns: 1fr; } }

  /* ── Charts ── */
  .chart-wrap    { position: relative; width: 100%; height: 260px; }
  .chart-wrap-sm { position: relative; width: 100%; height: 200px; }
  .chart-wrap-lg { position: relative; width: 100%; height: 320px; }

  /* ── Legend ── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 12px; font-size: 11px; color: var(--text-secondary);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── Tables ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    background: var(--surface2); color: var(--text-secondary);
    font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border2);
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody td { padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border); color: var(--text-primary); }
  tbody td:first-child { text-align: left; font-weight: 500; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface2); }
  tfoot td {
    padding: 8px 10px; text-align: right; font-weight: 700; font-size: 12px;
    background: var(--teal-light); color: var(--teal-dark); border-top: 2px solid rgba(6,148,162,0.2);
  }
  tfoot td:first-child { text-align: left; }

  /* ── Badges ── */
  .var-badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .var-green  { background: #c6f6d5; color: #276749; }
  .var-amber  { background: #fefcbf; color: #7b6000; }
  .var-orange { background: #feebc8; color: #7b3f00; }
  .var-red    { background: #fed7d7; color: #9b2c2c; }

  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 10px; font-weight: 600; white-space: nowrap;
  }
  .pill-green  { background: #c6f6d5; color: #276749; }
  .pill-red    { background: #fed7d7; color: #9b2c2c; }
  .pill-gray   { background: #e2e8f0; color: #4a5568; }
  .pill-amber  { background: #fefcbf; color: #7b6000; }
  .pill-teal   { background: var(--teal-light); color: var(--teal-dark); }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 12px 16px;
    margin-bottom: 16px; box-shadow: var(--shadow-sm);
  }
  .filter-bar label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .filter-bar select, .filter-bar input {
    border: 1px solid var(--border2); border-radius: 6px;
    padding: 5px 10px; font-size: 12px; color: var(--text-primary);
    background: var(--surface2); cursor: pointer; outline: none;
  }
  .filter-bar select:focus, .filter-bar input:focus { border-color: var(--teal); }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-reset {
    background: var(--teal-light); color: var(--teal-dark); border: 1px solid rgba(6,148,162,0.2);
    border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .filter-reset:hover { background: #bce9ed; }

  /* ── Footer ── */
  .footer {
    text-align: center; font-size: 11px; color: var(--text-muted);
    padding: 1.5rem; border-top: 1px solid var(--border); margin-top: 2rem;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Filter / toolbar bar ── */
  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 12px 16px;
    margin-bottom: 16px; box-shadow: var(--shadow-sm);
    position: sticky; top: 102px; z-index: 90;
  }
  .toolbar-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .toolbar label { font-size: 12px; color: var(--text-secondary); font-weight: 600; white-space: nowrap; }
  .toolbar select, .toolbar input[type="date"] {
    border: 1px solid var(--border2); border-radius: 6px;
    padding: 5px 10px; font-size: 12px; color: var(--text-primary);
    background: var(--surface); cursor: pointer; outline: none; height: 32px;
  }
  .toolbar select:focus, .toolbar input[type="date"]:focus { border-color: var(--teal); box-shadow: 0 0 0 2px rgba(6,148,162,0.15); }
  .toolbar-sep { width: 1px; height: 24px; background: var(--border2); margin: 0 4px; }
  .tb-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent; height: 32px; white-space: nowrap;
    transition: all 0.15s;
  }
  .tb-btn-teal   { background: var(--teal); color: white; border-color: var(--teal-dark); }
  .tb-btn-teal:hover { background: var(--teal-dark); }
  .tb-btn-white  { background: var(--surface); color: var(--text-primary); border-color: var(--border2); }
  .tb-btn-white:hover { background: var(--surface2); }
  .tb-btn-green  { background: #1d9e75; color: white; border-color: #157a5c; }
  .tb-btn-green:hover { background: #157a5c; }
  .tb-btn-red    { background: var(--red); color: white; border-color: #b83535; }
  .tb-btn-red:hover   { background: #b83535; }
  .tb-badge {
    font-size: 10px; background: var(--teal-light); color: var(--teal-dark);
    padding: 1px 6px; border-radius: 10px; font-weight: 700;
  }
  .screenshot-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column; gap: 16px;
  }
  .screenshot-overlay .spin-wrap { text-align: center; color: white; }
  .screenshot-overlay .spinner { border-color: rgba(255,255,255,0.3); border-top-color: white; }
  .screenshot-overlay p { color: rgba(255,255,255,0.85); font-size: 14px; margin-top: 10px; }

  /* ── Bar chart horizontal ── */
  .hbar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; }
  .hbar-label { width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-secondary); flex-shrink: 0; }
  .hbar-track { flex: 1; background: var(--surface2); border-radius: 3px; height: 10px; overflow: hidden; }
  .hbar-fill  { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .hbar-val   { width: 36px; text-align: right; font-weight: 600; color: var(--text-primary); flex-shrink: 0; }

  /* ── Top-level nav tabs ── */
  .nav-tabs-bar {
    background: linear-gradient(135deg, #047481 0%, #0694a2 50%, #00b5cc 100%);
    display: flex; align-items: flex-end;
    padding: 0 2rem; gap: 4px;
    border-bottom: 2px solid rgba(255,255,255,0.18);
  }
  .nav-tab {
    padding: 10px 22px; font-size: 13px; font-weight: 600; cursor: pointer;
    color: rgba(255,255,255,0.72); border: none; background: transparent;
    border-radius: 8px 8px 0 0; transition: all 0.18s; letter-spacing: 0.01em;
    border-bottom: 3px solid transparent; margin-bottom: -2px;
  }
  .nav-tab:hover { color: white; background: rgba(255,255,255,0.12); }
  .nav-tab.active {
    color: white; background: rgba(255,255,255,0.18);
    border-bottom: 3px solid white;
  }

  /* ── Sub-tabs (Reports page) ── */
  .sub-tabs-bar {
    display: flex; gap: 4px; align-items: center;
    background: var(--surface); border-bottom: 2px solid var(--border);
    padding: 0 2rem; position: sticky; top: 102px; z-index: 89;
    box-shadow: var(--shadow-sm);
  }
  .sub-tab {
    padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
    color: var(--text-muted); border: none; background: transparent;
    border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: all 0.15s; border-radius: 6px 6px 0 0;
  }
  .sub-tab:hover { color: var(--teal); background: var(--teal-light); }
  .sub-tab.active { color: var(--teal-dark); border-bottom: 3px solid var(--teal); }

  /* ── Incentive table styles ── */
  .inc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .inc-table thead th {
    background: linear-gradient(135deg,#6c63d4,#9b80e6);
    color: white; font-weight: 600; font-size: 11px;
    padding: 9px 10px; text-align: center;
    border: 1px solid rgba(255,255,255,0.15); white-space: nowrap;
  }
  .inc-table thead th:first-child { text-align: center; }
  .inc-table tbody tr:nth-child(odd)  td { background: #fafaff; }
  .inc-table tbody tr:nth-child(even) td { background: #ffffff; }
  .inc-table tbody tr:hover td { background: #f0eeff; }
  .inc-table tbody td {
    padding: 7px 10px; text-align: center;
    border: 1px solid #e9e9f5; color: var(--text-primary); font-size: 12px;
  }
  .inc-table tbody td:nth-child(2) { text-align: left; font-weight: 600; }
  .inc-table tfoot td {
    background: linear-gradient(135deg,#6c63d4,#9b80e6);
    color: white; font-weight: 700; text-align: center;
    padding: 8px 10px; font-size: 12px;
  }
  .done-cell  { background: #e8f9f0 !important; color: #1a6b47; font-weight: 700; }
  .pend-pos   { background: #fff3e0 !important; color: #8a4a00; font-weight: 600; }
  .pend-neg   { background: #ffeaea !important; color: #9b2c2c; font-weight: 600; }
  .inc-pos    { background: #e8f9f0 !important; color: #1a6b47; font-weight: 700; }
  .inc-neg    { background: #ffeaea !important; color: #9b2c2c; font-weight: 700; }

  .inc-summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
    gap: 12px; margin-bottom: 16px;
  }
  .inc-kpi {
    background: var(--surface); border-radius: var(--radius-md);
    border: 1px solid var(--border); padding: 14px 16px;
    box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
  }
  .inc-kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#6c63d4,#9b80e6); }
  .inc-kpi-label { font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
  .inc-kpi-val   { font-size:22px; font-weight:700; color:var(--text-primary); }
  .inc-kpi-meta  { font-size:11px; color:var(--text-muted); margin-top:4px; }

  .inc-filter-row {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
  }
  .inc-filter-row label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .inc-filter-row select, .inc-filter-row input {
    height: 30px; border: 1px solid var(--border2); border-radius: 6px;
    padding: 0 8px; font-size: 12px; background: var(--surface2); outline: none;
  }
  .inc-filter-row select:focus, .inc-filter-row input:focus { border-color: #6c63d4; }
  .inc-export-btn {
    margin-left: auto; display: flex; align-items: center; gap: 5px;
    padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    background: #6c63d4; color: white; border: none; cursor: pointer; height: 30px;
  }
  .inc-export-btn:hover { background: #5a52b8; }
  .legend-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500;
  }
  .legend-pill-green { background:#e8f9f0; color:#1a6b47; }
  .legend-pill-red   { background:#ffeaea; color:#9b2c2c; }
  .legend-pill-amber { background:#fff3e0; color:#8a4a00; }


  /* ══ Inventory User Dashboard ══ */
  .inv-kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px; margin-bottom: 18px;
  }
  .inv-kpi {
    background: var(--surface); border-radius: var(--radius-md);
    border: 1px solid var(--border); padding: 16px 18px;
    box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
  }
  .inv-kpi::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #f6820c, #f0a82e);
  }
  .inv-kpi-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .inv-kpi-val   { font-size: 26px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .inv-kpi-meta  { font-size: 11px; color: var(--text-muted); margin-top: 5px; }

  /* Forecast cards row */
  .forecast-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 18px;
  }
  @media(max-width:700px){ .forecast-row { grid-template-columns: 1fr; } }
  .fc-card {
    background: var(--surface); border-radius: var(--radius-md);
    border: 1px solid var(--border); padding: 16px 18px;
    box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    display: flex; flex-direction: column; gap: 4px;
  }
  .fc-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .fc-card.fc1::before { background: linear-gradient(90deg,#378add,#6db3f2); }
  .fc-card.fc2::before { background: linear-gradient(90deg,#6c63d4,#9b80e6); }
  .fc-card.fc3::before { background: linear-gradient(90deg,#1d9e75,#56cfaa); }
  .fc-month   { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
  .fc-val     { font-size: 30px; font-weight: 800; color: var(--text-primary); line-height: 1.1; }
  .fc-badge   { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 2px; width: fit-content; }
  .fc-badge-up   { background: #e8f9f0; color: #1a6b47; }
  .fc-badge-down { background: #ffeaea; color: #9b2c2c; }
  .fc-badge-flat { background: var(--teal-light); color: var(--teal-dark); }

<!-- ══ SCRIPTS ══════════════════════════════════════════════════ -->
<script>
/* ─── CONFIG ─────────────────────────────────────────────────── */
// ✅ Updated to your new Web App URL
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqwR55GP6tVdbnt-UJ3oc8gSTwgsXcdxvPy-jcHfS4PnV2lGfawwRH8D4WLbRuTrY6/exec';

/* ─── COLORS ─────────────────────────────────────────────────── */
const STATUS_COLORS = {
  'Done':            '#1d9e75',
  'Close':           '#ba7517',
  'Not Related':     '#d4537e',
  'Other Language':  '#7f77dd',
  'Physical Visit':  '#378add',
  'Tech Concern':    '#85b7eb',
  'Missed':          '#e24b4a',
  '(none)':          '#888780'
};
const CAT_COLORS = {
  'Issues':          '#7f77dd',
  'Close':           '#ba7517',
  'Training':        '#1d9e75',
  'Physical Visit':  '#639922',
  'Google Meet':     '#17a0ba',
  'WhatsApp Call':   '#d4537e',
  'Whatsapp Call':   '#d4537e',
  '(none)':          '#888780'
};
const INTERACTION_COLORS = {
  'Inbound':         '#0694a2',
  'Outbound':        '#ba7517',
  'Missed':          '#e24b4a',
  '(none)':          '#888780'
};

// ✅ All Status1 values from your sheet
const STATUS_KEYS = ['Done','Close','Not Related','Other Language','Physical Visit','Tech Concern'];
// ✅ All Category values from your sheet
const CAT_KEYS    = ['Issues','Close','Training','Physical Visit','Google Meet','WhatsApp Call'];

/* ─── UTILS ─────────────────────────────────────────────────── */
const fmt = n => (n||0).toLocaleString('en-IN');
const pct = (n,t) => t ? (n/t*100).toFixed(1)+'%' : '0%';

function secsToHMS(s) {
  s = Math.round(Math.abs(s||0));
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  return [h,m,ss].map(x=>String(x).padStart(2,'0')).join(':');
}

function secToMM(s) {
  s = Math.round(Math.abs(s||0));
  const m = Math.floor(s/60), ss = s%60;
  return m + 'm ' + String(ss).padStart(2,'0') + 's';
}

function varBadge(variance) {
  const abs = Math.abs(variance);
  let cls;
  if (abs < 60)        cls = 'var-green';
  else if (abs < 300)  cls = 'var-amber';
  else if (abs < 600)  cls = 'var-orange';
  else                 cls = 'var-red';
  const sign = variance >= 0 ? '+' : '-';
  return `<span class="var-badge ${cls}">${sign}${secsToHMS(abs)}</span>`;
}

// ✅ Fixed: parse "Date (mm/dd/yyyy)" column to extract hour from "Time" column
function parseHour(row) {
  // First try the dedicated Time column
  const timeVal = row['Time'] || '';
  if (timeVal) {
    const m = String(timeVal).match(/(\d{1,2}):(\d{2})/);
    if (m) return parseInt(m[1]);
  }
  // Fallback: try Date column
  const dateVal = row['Date'] || row['Date (mm/dd/yyyy)'] || '';
  if (dateVal) {
    const d = new Date(dateVal);
    if (!isNaN(d)) return d.getHours();
  }
  return -1;
}

// ✅ Fixed: parse "Date (mm/dd/yyyy)" correctly for working-day counting
function parseDate(row) {
  const raw = row['Date (mm/dd/yyyy)'] || row['Date'] || '';
  if (!raw) return null;
  // Apps Script returns yyyy-MM-dd for date cells
  const d = new Date(raw);
  if (!isNaN(d)) return d.toISOString().slice(0,10);
  return null;
}

// ✅ Fixed: Customer Talk Duration comes as seconds (number or string)
function parseDuration(row) {
  const raw = row['Customer Talk Duration'];
  if (raw === '' || raw === null || raw === undefined) return 0;
  const n = parseFloat(raw);
  return isNaN(n) ? 0 : Math.max(0, n);
}

/* ─── FETCH ──────────────────────────────────────────────────── */
let chartInstances = [];
let ALL_ROWS = [];

function destroyCharts() { chartInstances.forEach(c => c.destroy()); chartInstances = []; }

async function loadData() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Loading data…</div>
    <div class="loading-sub">Please wait while we fetch your call records</div>
  </div>`;
  destroyCharts();

  try {
    const res = await fetch(SCRIPT_URL + '?ts=' + Date.now()); // cache-bust
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();

    let raw;
    try { raw = JSON.parse(text); }
    catch {
      const m = text.match(/\[[\s\S]*\]/);
      if (m) raw = JSON.parse(m[0]);
      else throw new Error('Invalid JSON from Apps Script');
    }

    // ✅ Handles {status, data, count} wrapper from your Apps Script
    const rows = Array.isArray(raw) ? raw : (raw.data || raw.rows || []);
    if (!rows.length) throw new Error('No records returned. Check your sheet name is "Data Sheet".');

    ALL_ROWS = rows;
    renderDashboard(rows);
    if (currentTab === 'reports') renderIncentiveReport(rows);

    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    document.getElementById('footer').style.display = '';
    document.getElementById('footer-text').textContent =
      `${fmt(rows.length)} records processed · Sheet: "Data Sheet" · Last refreshed: ${new Date().toLocaleString()}`;

  } catch(err) {
    app.innerHTML = `<div class="error-card">
      <h3>⚠ Could not load data</h3>
      <p style="margin-top:8px"><strong>${err.message}</strong></p>
      <p style="margin-top:12px">
        Make sure your Apps Script is deployed with <code>Who has access: Anyone</code>.<br>
        Expected sheet name: <code>Data Sheet</code>
      </p>
      <button onclick="loadData()" style="margin-top:16px;padding:8px 20px;border-radius:8px;
        background:#0694a2;color:white;border:none;cursor:pointer;font-size:13px;font-weight:600">
        Retry
      </button>
    </div>`;
  }
}

/* ─── PROCESS DATA ───────────────────────────────────────────── */
function processData(rows) {
  // Per-agent maps
  const agentStatus  = {};   // agent → { Done, Close, ... , total }
  const agentCat     = {};   // agent → { Issues, Close, Training, ... , total }
  const agentTalk    = {};   // agent → { allSecs, allCnt, doneSecs, doneCnt, dates: Set }
  const agentMissed  = {};   // agent → count of Ismissed='TRUE'
  const agentCalledBack = {}; // agent → count of Called_Back='TRUE'

  // Hour-wise
  const hourStatus   = {};   // hh:00 → { Done, Close, ... , total }
  const hourCat      = {};   // hh:00 → { Issues, Close, ... }

  // Category × Status
  const catStatus    = {};   // cat → { Done, Close, ... , total }

  // CallRelatedTo breakdown
  const callRelated  = {};   // callRelatedTo → count

  // Interaction type
  const interactionType = {}; // type → count

  // Hyperpure / Petpooja flags
  let hyperpureLeads = 0, petpoojaOrders = 0;

  // Overall totals
  let totalCalls=0, doneCalls=0, closeCalls=0, notRel=0;
  let issues=0, training=0, physVisit=0;
  let missedCalls=0, calledBackCount=0;

  for (const row of rows) {
    const agent   = (row['Agent Name']      || 'Unknown').trim();
    // ✅ Normalize WhatsApp Call casing
    const rawCat  = (row['Category']        || '').trim();
    const cat     = rawCat.toLowerCase() === 'whatsapp call' ? 'WhatsApp Call' : (rawCat || '(none)');
    const st      = (row['Status1']         || '(none)').trim();
    const itype   = (row['Interaction Type']|| '(none)').trim();
    // ✅ CallRealatedTo — note the typo is in the sheet header
    const crt     = (row['CallRealatedTo']  || '(none)').trim();
    // ✅ Ismissed and Called_Back columns
    const isMissed   = String(row['Ismissed']  || '').trim().toUpperCase() === 'TRUE';
    const calledBack = String(row['Called_Back']|| '').trim().toUpperCase() === 'TRUE';
    // ✅ Hyperpure_Lead and Purchase_by_Petpooja
    const isHP  = String(row['Hyperpure_Lead']       || '').trim().toUpperCase() === 'TRUE';
    const isPP  = String(row['Purchase_by_Petpooja']  || '').trim().toUpperCase() === 'TRUE';

    const dur  = parseDuration(row);
    const hour = parseHour(row);
    const date = parseDate(row);

    totalCalls++;
    if (st === 'Done')          doneCalls++;
    if (st === 'Close')         closeCalls++;
    if (st === 'Not Related')   notRel++;
    if (cat === 'Issues')       issues++;
    if (cat === 'Training')     training++;
    if (cat === 'Physical Visit') physVisit++;
    if (isMissed)               missedCalls++;
    if (calledBack)             calledBackCount++;
    if (isHP)                   hyperpureLeads++;
    if (isPP)                   petpoojaOrders++;

    /* agent × status */
    if (!agentStatus[agent]) {
      agentStatus[agent] = {Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,'Tech Concern':0,total:0};
    }
    agentStatus[agent][st]  = (agentStatus[agent][st]||0)+1;
    agentStatus[agent].total++;

    /* agent × category */
    if (!agentCat[agent]) {
      agentCat[agent] = {Issues:0,Close:0,Training:0,'Physical Visit':0,'Google Meet':0,'WhatsApp Call':0,total:0};
    }
    agentCat[agent][cat] = (agentCat[agent][cat]||0)+1;
    agentCat[agent].total++;

    /* agent talk time + working days */
    if (!agentTalk[agent]) agentTalk[agent] = {allSecs:0,allCnt:0,doneSecs:0,doneCnt:0,dates:new Set()};
    if (dur > 0) {
      agentTalk[agent].allSecs += dur;
      agentTalk[agent].allCnt++;
    }
    if (st === 'Done' && dur > 0) {
      agentTalk[agent].doneSecs += dur;
      agentTalk[agent].doneCnt++;
    }
    // ✅ Working days = unique dates per agent
    if (date) agentTalk[agent].dates.add(date);

    /* agent missed / called back */
    agentMissed[agent]    = (agentMissed[agent]||0)    + (isMissed ? 1 : 0);
    agentCalledBack[agent]= (agentCalledBack[agent]||0) + (calledBack ? 1 : 0);

    /* hour × status & category */
    if (hour >= 0) {
      const hk = String(hour).padStart(2,'0')+':00';
      if (!hourStatus[hk]) hourStatus[hk] = {Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,'Tech Concern':0,total:0};
      hourStatus[hk][st] = (hourStatus[hk][st]||0)+1;
      hourStatus[hk].total++;
      if (!hourCat[hk]) hourCat[hk] = {};
      hourCat[hk][cat]   = (hourCat[hk][cat]||0)+1;
    }

    /* category × status */
    if (!catStatus[cat]) catStatus[cat] = {Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,'Tech Concern':0,total:0};
    catStatus[cat][st] = (catStatus[cat][st]||0)+1;
    catStatus[cat].total++;

    /* CallRealatedTo */
    callRelated[crt] = (callRelated[crt]||0)+1;

    /* Interaction type */
    interactionType[itype] = (interactionType[itype]||0)+1;
  }

  return {
    totalCalls, doneCalls, closeCalls, notRel,
    issues, training, physVisit,
    missedCalls, calledBackCount, hyperpureLeads, petpoojaOrders,
    agentStatus, agentCat, agentTalk, agentMissed, agentCalledBack,
    hourStatus, hourCat, catStatus, callRelated, interactionType
  };
}

/* ─── RENDER DASHBOARD ───────────────────────────────────────── */
function renderDashboard(rows) {
  const app = document.getElementById('app');
  const d = processData(rows);
  // Show toolbar and populate dropdowns
  document.getElementById('toolbar').style.display = 'flex';
  populateFilters(ALL_ROWS);

  const topAgentsByTotal = Object.entries(d.agentStatus).sort((a,b)=>b[1].total-a[1].total);
  const topAgentsByCat   = Object.entries(d.agentCat).sort((a,b)=>b[1].total-a[1].total);
  const talkAgents       = Object.entries(d.agentTalk).sort((a,b)=>b[1].allCnt-a[1].allCnt);

  const hasHourData = Object.keys(d.hourStatus).length > 0;
  const hours  = Object.keys(d.hourStatus).sort();
  const hLabels = hours.map(h => {
    const n = (parseInt(h)+1)%24;
    return h.replace(':00','') + ':00–' + String(n).padStart(2,'0') + ':00';
  });

  /* Category-status totals row */
  const catStatusKeys = Object.keys(d.catStatus)
    .sort((a,b) => d.catStatus[b].total - d.catStatus[a].total);
  const catTotRow = catStatusKeys.reduce((acc,cat) => {
    const v = d.catStatus[cat];
    acc.Done           += (v.Done||0);
    acc.Close          += (v.Close||0);
    acc['Not Related'] += (v['Not Related']||0);
    acc['Other Language']+=(v['Other Language']||0);
    acc['Physical Visit']+=(v['Physical Visit']||0);
    acc['Tech Concern'] += (v['Tech Concern']||0);
    acc.total          += v.total;
    return acc;
  },{Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,'Tech Concern':0,total:0});

  /* Agent-status totals */
  const asTot={Done:0,Close:0,'Not Related':0,'Other Language':0,'Physical Visit':0,'Tech Concern':0,total:0};
  for(const [,v] of topAgentsByTotal) for(const k of Object.keys(asTot)) asTot[k]=(asTot[k]||0)+(v[k]||0);

  /* Agent-category totals */
  const acTot={Issues:0,Close:0,Training:0,'Physical Visit':0,'Google Meet':0,'WhatsApp Call':0,total:0};
  for(const [,v] of topAgentsByCat) for(const k of Object.keys(acTot)) acTot[k]=(acTot[k]||0)+(v[k]||0);

/* ─── LEGEND BUILDER ─────────────────────────────────────────── */
function buildLegend(elId, keys, colorMap, vals, total) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = keys.map((k,i)=>{
    const pctStr = (vals && total && vals[i] !== undefined) ? ` ${(vals[i]/total*100).toFixed(1)}%` : '';
    return `<span class="legend-item">
      <span class="legend-dot" style="background:${colorMap[k]||'#888'}"></span>
      ${k}${pctStr}
    </span>`;
  }).join('');
}

/* ─── FILTER STATE ───────────────────────────────────────────── */
let FILTER_STATE = { dateFrom:'', dateTo:'', agent:'', status:'', category:'', itype:'' };

function applyFilters() {
  FILTER_STATE.dateFrom   = document.getElementById('f-date-from').value;
  FILTER_STATE.dateTo     = document.getElementById('f-date-to').value;
  FILTER_STATE.agent      = document.getElementById('f-agent').value;
  FILTER_STATE.status     = document.getElementById('f-status').value;
  FILTER_STATE.category   = document.getElementById('f-category').value;
  FILTER_STATE.itype      = document.getElementById('f-itype').value;

  const filtered = filterRows(ALL_ROWS);

  // Update badge count
  const activeCount = Object.values(FILTER_STATE).filter(v=>v!=='').length;
  const badge = document.getElementById('filter-badge');
  if (activeCount > 0) {
    badge.style.display = 'inline-block';
    badge.textContent = activeCount + ' filter' + (activeCount>1?'s':'') + ' active · ' + filtered.length.toLocaleString('en-IN') + ' records';
  } else {
    badge.style.display = 'none';
  }

  renderDashboard(filtered);
}

function filterRows(rows) {
  return rows.filter(row => {
    const date = parseDate(row);
    if (FILTER_STATE.dateFrom && date && date < FILTER_STATE.dateFrom) return false;
    if (FILTER_STATE.dateTo   && date && date > FILTER_STATE.dateTo)   return false;
    const agent = (row['Agent Name']||'').trim();
    if (FILTER_STATE.agent && agent !== FILTER_STATE.agent) return false;
    const st = (row['Status1']||'').trim();
    if (FILTER_STATE.status && st !== FILTER_STATE.status) return false;
    const rawCat = (row['Category']||'').trim();
    const cat = rawCat.toLowerCase()==='whatsapp call' ? 'WhatsApp Call' : rawCat;
    if (FILTER_STATE.category && cat !== FILTER_STATE.category) return false;
    const itype = (row['Interaction Type']||'').trim();
    if (FILTER_STATE.itype && itype !== FILTER_STATE.itype) return false;
    return true;
  });
}

function resetFilters() {
  ['f-date-from','f-date-to'].forEach(id => { document.getElementById(id).value = ''; });
  ['f-agent','f-status','f-category','f-itype'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  FILTER_STATE = { dateFrom:'', dateTo:'', agent:'', status:'', category:'', itype:'' };
  document.getElementById('filter-badge').style.display = 'none';
  renderDashboard(ALL_ROWS);
}

function populateFilters(rows) {
  const agents     = [...new Set(rows.map(r=>(r['Agent Name']||'').trim()))].filter(Boolean).sort();
  const statuses   = [...new Set(rows.map(r=>(r['Status1']||'').trim()))].filter(Boolean).sort();
  const categories = [...new Set(rows.map(r=>{
    const c=(r['Category']||'').trim();
    return c.toLowerCase()==='whatsapp call'?'WhatsApp Call':c;
  }))].filter(Boolean).sort();
  const itypes     = [...new Set(rows.map(r=>(r['Interaction Type']||'').trim()))].filter(Boolean).sort();

  const fillSelect = (id, options) => {
    const el = document.getElementById(id);
    if (!el) return;
    const cur = el.value;
    // keep first option "All"
    while (el.options.length > 1) el.remove(1);
    options.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      el.appendChild(opt);
    });
    if (options.includes(cur)) el.value = cur;
  };

  fillSelect('f-agent',    agents);
  fillSelect('f-status',   statuses);
  fillSelect('f-category', categories);
  fillSelect('f-itype',    itypes);

  // Set date range defaults from data
  const dates = rows.map(r => parseDate(r)).filter(Boolean).sort();
  if (dates.length) {
    const fromEl = document.getElementById('f-date-from');
    const toEl   = document.getElementById('f-date-to');
    if (!fromEl.value) fromEl.value = dates[0];
    if (!toEl.value)   toEl.value   = dates[dates.length-1];
  }
}

/* ─── INCENTIVE CALCULATION ───────────────────────────────────
   Logic from screenshot:
   - Company Working Days = 24  (fixed monthly)
   - Company Target       = 480 (fixed = Working Days × 20)
   - Agent Working Days   = unique days agent has calls
   - Agent Target         = Agent Working Days × 20
   - Present              = days agent was present (same as working days from data)
   - Done                 = count of Status1 = "Done" for that agent that month
   - Pending              = Agent Target − Done  (negative = exceeded target)
   - Incentive/Penalty:
       If Done >= Agent Target  →  +500 (incentive)
       Else                     →  −1000 (penalty)
   ──────────────────────────────────────────────────────────── */
const COMPANY_WORKING_DAYS = 24;
const DAILY_TARGET         = 20;   // calls per day
const INCENTIVE_AMOUNT     = 500;
const PENALTY_AMOUNT       = -1000;

function getMonthLabel(dateStr) {
  if (!dateStr) return 'Unknown';
  const d = new Date(dateStr);
  if (isNaN(d)) return 'Unknown';
  return d.toLocaleString('en-IN', { month: 'long', year: 'numeric' });
}

function renderIncentiveReport(rows) {
  const container = document.getElementById('incentive-content');

  // ── Group by month × agent
  // monthKey = 'YYYY-MM'
  const monthAgentData = {};

  for (const row of rows) {
    const agent    = (row['Agent Name'] || 'Unknown').trim();
    const st       = (row['Status1']    || '').trim();
    const dateStr  = parseDate(row);
    if (!dateStr) continue;

    const monthKey = dateStr.slice(0, 7); // YYYY-MM
    if (!monthAgentData[monthKey]) monthAgentData[monthKey] = {};
    if (!monthAgentData[monthKey][agent]) {
      monthAgentData[monthKey][agent] = { dates: new Set(), done: 0 };
    }
    monthAgentData[monthKey][agent].dates.add(dateStr);
    if (st === 'Done') monthAgentData[monthKey][agent].done++;
  }

  // Sort months descending
  const months = Object.keys(monthAgentData).sort().reverse();

  // Filter controls
  const allAgents = [...new Set(rows.map(r => (r['Agent Name']||'').trim()))].filter(Boolean).sort();
  const selMonth  = document.getElementById('inc-sel-month')?.value  || '';
  const selAgent  = document.getElementById('inc-sel-agent')?.value  || '';

  // Build table for selected month (default: latest)
  const activeMonths = selMonth ? [selMonth] : months;

  let grandTotalDone = 0, grandIncentive = 0, grandPenalty = 0, totalAgents = 0;
  let tableRows = '';
  let rowNum = 1;

  for (const mk of activeMonths) {
    const agents = Object.entries(monthAgentData[mk])
      .filter(([name]) => !selAgent || name === selAgent)
      .sort((a,b) => b[1].done - a[1].done);

    for (const [name, v] of agents) {
      const workingDays  = v.dates.size;
      const agentTarget  = workingDays * DAILY_TARGET;
      const done         = v.done;
      const pending      = agentTarget - done;
      const incentive    = done >= agentTarget ? INCENTIVE_AMOUNT : PENALTY_AMOUNT;

      grandTotalDone += done;
      if (incentive > 0) grandIncentive += incentive;
      else               grandPenalty   += incentive;
      totalAgents++;

      const monthLabel = getMonthLabel(mk + '-01');
      const pendClass  = pending < 0 ? 'pend-neg' : 'pend-pos';
      const incClass   = incentive > 0 ? 'inc-pos' : 'inc-neg';
      const incText    = incentive > 0 ? `+${incentive.toLocaleString()}` : incentive.toLocaleString();

      tableRows += `<tr>
        <td>${rowNum++}</td>
        <td>${monthLabel}</td>
        <td>${name}</td>
        <td>${COMPANY_WORKING_DAYS}</td>
        <td>${COMPANY_WORKING_DAYS * DAILY_TARGET}</td>
        <td>${workingDays}</td>
        <td>${agentTarget}</td>
        <td>${workingDays}</td>
        <td class="done-cell">${done}</td>
        <td class="${pendClass}">${pending}</td>
        <td class="${incClass}">${incText}</td>
      </tr>`;
    }
  }

  const qualifiedCount   = totalAgents > 0 ? rows.filter ? 0 : 0 : 0; // recalc below
  // Count incentive vs penalty
  let incCount = 0, penCount = 0;
  for (const mk of activeMonths) {
    for (const [name, v] of Object.entries(monthAgentData[mk])) {
      if (selAgent && name !== selAgent) continue;
      const done = v.done;
      const target = v.dates.size * DAILY_TARGET;
      if (done >= target) incCount++;
      else penCount++;
    }
  }

  container.innerHTML = `
    <!-- Filter row -->
    <div class="inc-filter-row">
      <label>📅 Month</label>
      <select id="inc-sel-month" onchange="renderIncentiveReport(ALL_ROWS)">
        <option value="">All Months</option>
        ${months.map(m => `<option value="${m}" ${m===selMonth?'selected':''}>${getMonthLabel(m+'-01')}</option>`).join('')}
      </select>
      <label style="margin-left:8px">👤 Agent</label>
      <select id="inc-sel-agent" onchange="renderIncentiveReport(ALL_ROWS)">
        <option value="">All Agents</option>
        ${allAgents.map(a => `<option value="${a}" ${a===selAgent?'selected':''}>${a}</option>`).join('')}
      </select>
      <div style="display:flex;gap:8px;align-items:center;margin-left:8px">
        <span class="legend-pill legend-pill-green">✅ Incentive: ≥ Target</span>
        <span class="legend-pill legend-pill-red">❌ Penalty: < Target</span>
        <span class="legend-pill legend-pill-amber">Target = Working Days × ${DAILY_TARGET} calls/day</span>
      </div>
      <button class="inc-export-btn" onclick="exportIncentiveCSV()">
        ⬇ Export CSV
      </button>
    </div>

    <!-- KPI summary -->
    <div class="inc-summary-grid">
      <div class="inc-kpi">
        <div class="inc-kpi-label">Total Agents</div>
        <div class="inc-kpi-val">${totalAgents}</div>
        <div class="inc-kpi-meta">in selected period</div>
      </div>
      <div class="inc-kpi">
        <div class="inc-kpi-label">Earned Incentive</div>
        <div class="inc-kpi-val" style="color:#1a6b47">${incCount}</div>
        <div class="inc-kpi-meta">agents hit target (+₹${INCENTIVE_AMOUNT} each)</div>
      </div>
      <div class="inc-kpi">
        <div class="inc-kpi-label">Penalty Applied</div>
        <div class="inc-kpi-val" style="color:#9b2c2c">${penCount}</div>
        <div class="inc-kpi-meta">agents missed target (−₹${Math.abs(PENALTY_AMOUNT)} each)</div>
      </div>
      <div class="inc-kpi">
        <div class="inc-kpi-label">Net Incentive Payout</div>
        <div class="inc-kpi-val" style="color:${grandIncentive+grandPenalty>=0?'#1a6b47':'#9b2c2c'}">
          ₹${(grandIncentive + grandPenalty).toLocaleString('en-IN')}
        </div>
        <div class="inc-kpi-meta">Total: +₹${grandIncentive.toLocaleString('en-IN')} / −₹${Math.abs(grandPenalty).toLocaleString('en-IN')}</div>
      </div>
      <div class="inc-kpi">
        <div class="inc-kpi-label">Total Done Calls</div>
        <div class="inc-kpi-val">${grandTotalDone.toLocaleString('en-IN')}</div>
        <div class="inc-kpi-meta">across all agents</div>
      </div>
      <div class="inc-kpi">
        <div class="inc-kpi-label">Daily Target</div>
        <div class="inc-kpi-val">${DAILY_TARGET}</div>
        <div class="inc-kpi-meta">calls/day per agent</div>
      </div>
    </div>

    <!-- Main table -->
    <div class="panel" style="padding:0;overflow:hidden">
      <div style="padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)">
        <span style="font-size:14px;font-weight:600;color:var(--text-primary)">
          💰 Incentive Calculation
          <span style="font-size:11px;font-weight:400;color:var(--text-muted);margin-left:8px">${totalAgents} agents</span>
        </span>
        <span style="font-size:11px;color:var(--text-muted)">Company Working Days: ${COMPANY_WORKING_DAYS} · Daily Target: ${DAILY_TARGET} calls</span>
      </div>
      <div style="overflow-x:auto">
        <table class="inc-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Month</th>
              <th>Trainer Name</th>
              <th>Company<br>Working Days</th>
              <th>Company<br>Target</th>
              <th>Working<br>Days</th>
              <th>Target</th>
              <th>Present</th>
              <th>Done ▼</th>
              <th>Pending</th>
              <th>Incentive /<br>Penalty (₹)</th>
            </tr>
          </thead>
          <tbody>
            ${tableRows || '<tr><td colspan="11" style="padding:2rem;color:#718096">No data found for selected filters.</td></tr>'}
          </tbody>
          <tfoot>
            <tr>
              <td colspan="8">Total</td>
              <td>${grandTotalDone.toLocaleString('en-IN')}</td>
              <td>—</td>
              <td style="color:${grandIncentive+grandPenalty>=0?'#c6f6d5':'#fed7d7'}">
                ₹${(grandIncentive + grandPenalty).toLocaleString('en-IN')}
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  `;
}

function exportIncentiveCSV() {
  const rows = document.querySelectorAll('.inc-table tbody tr');
  if (!rows.length) { alert('No data to export.'); return; }
  const headers = ['#','Month','Trainer Name','Company Working Days','Company Target','Working Days','Target','Present','Done','Pending','Incentive/Penalty'];
  const csvRows = [headers.join(',')];
  rows.forEach(tr => {
    const cells = [...tr.querySelectorAll('td')].map(td => {
      const v = td.textContent.trim().replace(/"/g,'""');

  const blob = new Blob([csvRows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'incentive_calculation_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}


/* ─── INVENTORY USER 2026 ─────────────────────────────────────
   Uses columns: RestaurantId, Agent Name, Date / Date(mm/dd/yyyy)
   Logic:
   • Group rows by MONTH → collect unique RestaurantId values
   • Monthly unique restaurant count = distinct RestaurantId per month
   • Also group per AGENT per MONTH for leaderboard
   • Forecast next 3 months using simple linear regression on
     last ≥3 months of data (or flat if <3 months)
──────────────────────────────────────────────────────────────── */

let invChartInstance = null;

function renderInventoryReport(rows) {
  const container = document.getElementById('inventory-content');
  if (!container) return;

  // ── Aggregate: month → Set of unique RestaurantIds ──────────
  const monthRestIds   = {};   // 'YYYY-MM' → Set<restaurantId>
  const agentMonthIds  = {};   // agentName → { 'YYYY-MM' → Set<restaurantId> }
  const allRestIds     = new Set();

  for (const row of rows) {
    const restId = String(row['RestaurantId'] || row['Restaurantid'] || row['restaurantId'] || '').trim();
    if (!restId || restId === '(none)' || restId === '') continue;

    const dateStr = parseDate(row);
    if (!dateStr) continue;
    const monthKey = dateStr.slice(0, 7);

    const agent = (row['Agent Name'] || 'Unknown').trim();

    // Month-level
    if (!monthRestIds[monthKey]) monthRestIds[monthKey] = new Set();
    monthRestIds[monthKey].add(restId);
    allRestIds.add(restId);

    // Agent × Month
    if (!agentMonthIds[agent]) agentMonthIds[agent] = {};
    if (!agentMonthIds[agent][monthKey]) agentMonthIds[agent][monthKey] = new Set();
    agentMonthIds[agent][monthKey].add(restId);
  }

  const sortedMonths = Object.keys(monthRestIds).sort();
  if (!sortedMonths.length) {
    container.innerHTML = `<div class="panel" style="text-align:center;padding:3rem">
      <div style="font-size:40px">📦</div>
      <p style="color:var(--text-muted);margin-top:12px">No RestaurantId data found in your sheet.<br>
      <small>Expected column name: <code>RestaurantId</code></small></p>
    </div>`;
    return;
  }

  // ── Monthly counts array ─────────────────────────────────────
  const monthlyCounts = sortedMonths.map(m => monthRestIds[m].size);

  // ── Cumulative unique (running total) ────────────────────────
  const cumulSet = new Set();
  const cumulCounts = sortedMonths.map(m => {
    monthRestIds[m].forEach(id => cumulSet.add(id));
    return cumulSet.size;
  });

  // ── Month-over-month change ──────────────────────────────────
  const momChanges = monthlyCounts.map((v, i) => i === 0 ? null : v - monthlyCounts[i - 1]);

  // ── Linear regression forecast for next 3 months ────────────
  function linReg(ys) {
    const n = ys.length;
    if (n < 2) return { slope: 0, intercept: ys[0] || 0 };
    const xs = ys.map((_, i) => i);
    const meanX = xs.reduce((a, b) => a + b, 0) / n;
    const meanY = ys.reduce((a, b) => a + b, 0) / n;
    let num = 0, den = 0;
    xs.forEach((x, i) => { num += (x - meanX) * (ys[i] - meanY); den += (x - meanX) ** 2; });
    const slope = den ? num / den : 0;
    return { slope, intercept: meanY - slope * meanX };
  }

  const regData = monthlyCounts.slice(-Math.min(monthlyCounts.length, 6)); // use last 6 months
  const { slope, intercept } = linReg(regData);
  const baseIdx = monthlyCounts.length - 1;

  function nextMonthKey(mk, offset) {
    const [y, m] = mk.split('-').map(Number);
    const d = new Date(y, m - 1 + offset, 1);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  }

  const forecastMonths = [1, 2, 3].map(off => nextMonthKey(sortedMonths[sortedMonths.length - 1], off));
  const forecastVals   = [1, 2, 3].map((_, i) => {
    const raw = Math.round(intercept + slope * (regData.length - 1 + i + 1));
    return Math.max(raw, 1);
  });

  // ── KPI calcs ────────────────────────────────────────────────
  const totalUnique   = allRestIds.size;
  const latestMonth   = sortedMonths[sortedMonths.length - 1];
  const latestCount   = monthRestIds[latestMonth].size;
  const prevCount     = sortedMonths.length > 1 ? monthRestIds[sortedMonths[sortedMonths.length - 2]].size : 0;
  const avgMonthly    = Math.round(monthlyCounts.reduce((a, b) => a + b, 0) / monthlyCounts.length);
  const maxMonth      = sortedMonths[monthlyCounts.indexOf(Math.max(...monthlyCounts))];
  const maxCount      = Math.max(...monthlyCounts);
  const momDiff       = prevCount ? latestCount - prevCount : 0;
  const momPct        = prevCount ? ((momDiff / prevCount) * 100).toFixed(1) : '—';

  // ── Top agents (all-time unique RestaurantIds) ───────────────
  const agentTotals = Object.entries(agentMonthIds).map(([agent, months]) => {
    const allIds = new Set();
    Object.values(months).forEach(s => s.forEach(id => allIds.add(id)));
    return { agent, count: allIds.size };
  }).sort((a, b) => b.count - a.count).slice(0, 10);
  const maxAgentCount = agentTotals[0]?.count || 1;

  // ── Read filter ───────────────────────────────────────────────
  const selYear = document.getElementById('inv-sel-year')?.value || '';
  const filteredMonths = selYear
    ? sortedMonths.filter(m => m.startsWith(selYear))
    : sortedMonths;
  const filteredCounts = filteredMonths.map(m => monthRestIds[m].size);

  const years = [...new Set(sortedMonths.map(m => m.slice(0, 4)))].sort();

  // ── Build chart labels for display (e.g. "Jan 2026") ─────────
  function fmtMonth(mk) {
    return new Date(mk + '-01').toLocaleString('en-IN', { month: 'short', year: 'numeric' });
  }
  const chartLabels      = filteredMonths.map(fmtMonth);
  const forecastLabels   = forecastMonths.map(fmtMonth);
  const allChartLabels   = [...chartLabels, ...forecastLabels];
  const allBarData       = [...filteredCounts, ...forecastVals.map(() => null)];
  const allForecastData  = [...filteredCounts.map(() => null), ...forecastVals];

  // ── Monthly table rows ────────────────────────────────────────
  const tableRows = filteredMonths.map((mk, i) => {
    const cnt  = filteredCounts[i];
    const prev = i > 0 ? filteredCounts[i - 1] : null;
    const diff = prev !== null ? cnt - prev : null;
    let momHtml = '—';
    if (diff !== null) {
      const cls = diff > 0 ? 'mom-up' : diff < 0 ? 'mom-down' : 'mom-flat';
      const arrow = diff > 0 ? '▲' : diff < 0 ? '▼' : '─';
      const pctStr = prev ? ((diff / prev) * 100).toFixed(1) + '%' : '';
      momHtml = `<span class="${cls}">${arrow} ${Math.abs(diff)} (${pctStr})</span>`;
    }
    // Running cumulative for filtered months
    const runSet = new Set();
    filteredMonths.slice(0, i + 1).forEach(m => monthRestIds[m].forEach(id => runSet.add(id)));
    return `<tr>
      <td>${i + 1}</td>
      <td>${fmtMonth(mk)}</td>
      <td><strong>${cnt.toLocaleString('en-IN')}</strong></td>
      <td>${momHtml}</td>
      <td>${runSet.size.toLocaleString('en-IN')}</td>
    </tr>`;
  }).join('');

  // ── Forecast card helpers ─────────────────────────────────────
  function fcBadge(val, base) {
    const d = val - base;
    if (d > 0)  return `<span class="fc-badge fc-badge-up">▲ +${d.toLocaleString('en-IN')} vs last</span>`;
    if (d < 0)  return `<span class="fc-badge fc-badge-down">▼ ${d.toLocaleString('en-IN')} vs last</span>`;
    return `<span class="fc-badge fc-badge-flat">─ Flat</span>`;
  }

  // ── Render HTML ───────────────────────────────────────────────
  container.innerHTML = `
    <!-- Filter row -->
    <div class="inv-filter-row">
      <label>📅 Year</label>
      <select id="inv-sel-year" onchange="renderInventoryReport(ALL_ROWS)">
        <option value="">All Years</option>
        ${years.map(y => `<option value="${y}" ${y===selYear?'selected':''}>${y}</option>`).join('')}
      </select>
      <span style="font-size:11px;color:var(--text-muted);margin-left:8px">
        Showing ${filteredMonths.length} month${filteredMonths.length!==1?'s':''} ·
        ${filteredCounts.reduce((a,b)=>a+b,0).toLocaleString('en-IN')} total form submissions with unique Restaurant IDs
      </span>
      <button class="inv-export-btn" onclick="exportInventoryCSV()">⬇ Export CSV</button>
    </div>

    <!-- KPI cards -->
    <div class="inv-kpi-grid">
      <div class="inv-kpi">
        <div class="inv-kpi-label">Total Unique Restaurants</div>
        <div class="inv-kpi-val">${totalUnique.toLocaleString('en-IN')}</div>
        <div class="inv-kpi-meta">all-time across all months</div>
      </div>
      <div class="inv-kpi">
        <div class="inv-kpi-label">Latest Month</div>
        <div class="inv-kpi-val">${latestCount.toLocaleString('en-IN')}</div>
        <div class="inv-kpi-meta">${fmtMonth(latestMonth)} · ${momDiff >= 0 ? '+' : ''}${momDiff} vs prior month</div>
      </div>
      <div class="inv-kpi">
        <div class="inv-kpi-label">Monthly Average</div>
        <div class="inv-kpi-val">${avgMonthly.toLocaleString('en-IN')}</div>
        <div class="inv-kpi-meta">unique restaurants/month</div>
      </div>
      <div class="inv-kpi">
        <div class="inv-kpi-label">Best Month</div>
        <div class="inv-kpi-val">${maxCount.toLocaleString('en-IN')}</div>
        <div class="inv-kpi-meta">${fmtMonth(maxMonth)}</div>
      </div>
      <div class="inv-kpi">
        <div class="inv-kpi-label">MoM Change</div>
        <div class="inv-kpi-val" style="color:${momDiff>=0?'#1a6b47':'#9b2c2c'}">${momDiff>=0?'+':''}${momDiff}</div>
        <div class="inv-kpi-meta">${momPct !== '—' ? momPct + '% vs last month' : 'First month on record'}</div>
      </div>
      <div class="inv-kpi">
        <div class="inv-kpi-label">Months on Record</div>
        <div class="inv-kpi-val">${sortedMonths.length}</div>
        <div class="inv-kpi-meta">${fmtMonth(sortedMonths[0])} → ${fmtMonth(latestMonth)}</div>
      </div>
    </div>

    <!-- Forecast cards -->
    <p class="section-label">📈 Forecast — Next 3 Months <span style="font-size:10px;font-weight:400;color:var(--text-muted)">(linear regression on last ${regData.length} months)</span></p>
    <div class="forecast-row">
      <div class="fc-card fc1">
        <div class="fc-month">${fmtMonth(forecastMonths[0])}</div>
        <div class="fc-val">${forecastVals[0].toLocaleString('en-IN')}</div>
        ${fcBadge(forecastVals[0], latestCount)}
        <div class="fc-sub">Predicted unique restaurants</div>
        <div class="fc-method">Trend: ${slope >= 0 ? '▲' : '▼'} ${Math.abs(slope).toFixed(1)} restaurants/month</div>
      </div>
      <div class="fc-card fc2">
        <div class="fc-month">${fmtMonth(forecastMonths[1])}</div>
        <div class="fc-val">${forecastVals[1].toLocaleString('en-IN')}</div>
        ${fcBadge(forecastVals[1], forecastVals[0])}
        <div class="fc-sub">Predicted unique restaurants</div>
        <div class="fc-method">Based on historical pattern</div>
      </div>
      <div class="fc-card fc3">
        <div class="fc-month">${fmtMonth(forecastMonths[2])}</div>
        <div class="fc-val">${forecastVals[2].toLocaleString('en-IN')}</div>
        ${fcBadge(forecastVals[2], forecastVals[1])}
        <div class="fc-sub">Predicted unique restaurants</div>
        <div class="fc-method">3-month projected value</div>
      </div>
    </div>

    <!-- Main bar chart + agent leaderboard -->
    <p class="section-label">📊 Monthly Unique Restaurant IDs</p>
    <div style="display:grid;grid-template-columns:1fr 300px;gap:16px;margin-bottom:16px">
      <div class="panel">
        <div class="panel-title">
          Month-wise Unique Restaurant IDs
          <span class="panel-title-badge">Bar = Actual · Line = Forecast</span>
        </div>
        <div class="inv-chart-wrap">
          <canvas id="invBarChart"></canvas>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">Top Agents <span class="panel-title-badge">Unique Restaurants</span></div>
        <div id="agent-leaderboard">
          ${agentTotals.map((a, i) => {
            const rankCls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
            const pctWidth = (a.count / maxAgentCount * 100).toFixed(1);
            return `<div class="agent-rank-row">
              <div class="rank-num ${rankCls}">${i+1}</div>
              <div class="rank-name">${a.agent}</div>
              <div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:${pctWidth}%"></div></div>
              <div class="rank-val">${a.count.toLocaleString('en-IN')}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- Cumulative line chart -->
    <p class="section-label">📈 Cumulative Unique Restaurants Over Time</p>
    <div class="panel">
      <div class="panel-title">Running Total of Unique Restaurant IDs <span class="panel-title-badge">All-time growth</span></div>
      <div class="inv-chart-wrap-sm">
        <canvas id="invCumulChart"></canvas>
      </div>
    </div>

    <!-- Monthly breakdown table -->
    <p class="section-label">📋 Month-wise Breakdown Table</p>
    <div class="panel" style="padding:0;overflow:hidden">
      <div style="padding:14px 18px 10px;border-bottom:1px solid var(--border)">
        <span style="font-size:14px;font-weight:600">Unique Restaurant IDs per Month</span>
        <span style="font-size:11px;color:var(--text-muted);margin-left:10px">${filteredMonths.length} months shown</span>
      </div>
      <div style="overflow-x:auto">
        <table class="inv-table">
          <thead>
            <tr>
              <th>#</th><th>Month</th>
              <th>Unique Restaurant IDs</th>
              <th>MoM Change</th>
              <th>Cumulative Total</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
          <tfoot>
            <tr>
              <td colspan="2">Total / Final</td>
              <td>${filteredCounts.reduce((a,b)=>a+b,0).toLocaleString('en-IN')}</td>
              <td>—</td>
              <td>${(()=>{ const s=new Set(); filteredMonths.forEach(m=>monthRestIds[m].forEach(id=>s.add(id))); return s.size.toLocaleString('en-IN'); })()}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  `;

  // ── Draw charts ───────────────────────────────────────────────
  if (invChartInstance) { invChartInstance.destroy(); invChartInstance = null; }
  if (window._invCumulChart) { window._invCumulChart.destroy(); window._invCumulChart = null; }

  const barCtx = document.getElementById('invBarChart');
  if (barCtx) {
    invChartInstance = new Chart(barCtx, {
      data: {
        labels: allChartLabels,
        datasets: [
          {
            type: 'bar',
            label: 'Actual Unique Restaurants',
            data: allBarData,
            backgroundColor: allChartLabels.map((_, i) =>
              i < filteredMonths.length ? 'rgba(246,130,12,0.8)' : 'rgba(55,138,221,0.35)'
            ),
            borderColor: allChartLabels.map((_, i) =>
              i < filteredMonths.length ? '#f6820c' : '#378add'
            ),
            borderWidth: 2,
            borderRadius: 5,
            order: 2
          },
          {
            type: 'line',
            label: 'Forecast',
            data: allForecastData,
            borderColor: '#378add',
            backgroundColor: 'rgba(55,138,221,0.08)',
            borderWidth: 2,
            borderDash: [6, 4],
            pointRadius: 5,
            pointBackgroundColor: '#378add',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            tension: 0.3,
            fill: false,
            order: 1
          },
          {
            type: 'line',
            label: 'Actual Trend',
            data: [...filteredCounts, null, null, null],
            borderColor: '#1d9e75',
            backgroundColor: 'transparent',
            borderWidth: 2,
            borderDash: [3, 3],
            pointRadius: 0,
            tension: 0.4,
            fill: false,
            order: 1
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: true, position: 'top', labels: { font: { size: 11 }, boxWidth: 14 } },
          tooltip: {
            callbacks: {
              label: ctx => {
                if (ctx.raw === null) return null;
                const tag = ctx.dataIndex >= filteredMonths.length ? ' (forecast)' : '';
                return ` ${ctx.dataset.label}: ${ctx.raw.toLocaleString('en-IN')}${tag}`;
              }
            }
          }
        },
        scales: {
          x: { ticks: { maxRotation: 45, font: { size: 10 } }, grid: { color: 'rgba(0,0,0,0.04)' } },
          y: { beginAtZero: true, ticks: { font: { size: 10 } }, grid: { color: 'rgba(0,0,0,0.04)' },
               title: { display: true, text: 'Unique Restaurant IDs', font: { size: 11 } } }
        }
      }
    });
  }

  // Cumulative line chart
  const cumulCtx = document.getElementById('invCumulChart');
  if (cumulCtx) {
    const filtCumul = filteredMonths.map((_, i) => {
      const s = new Set();
      filteredMonths.slice(0, i + 1).forEach(m => monthRestIds[m].forEach(id => s.add(id)));
      return s.size;
    });
    window._invCumulChart = new Chart(cumulCtx, {
      type: 'line',
      data: {
        labels: chartLabels,
        datasets: [{
          label: 'Cumulative Unique Restaurants',
          data: filtCumul,
          borderColor: '#6c63d4',
          backgroundColor: 'rgba(108,99,212,0.08)',
          borderWidth: 2.5,
          pointRadius: 4,
          pointBackgroundColor: '#6c63d4',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          tension: 0.35,
          fill: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
        scales: {
          x: { ticks: { maxRotation: 45, font: { size: 10 } }, grid: { color: 'rgba(0,0,0,0.04)' } },
          y: { beginAtZero: false, ticks: { font: { size: 10 } }, grid: { color: 'rgba(0,0,0,0.04)' },
               title: { display: true, text: 'Cumulative Unique Restaurants', font: { size: 11 } } }
        }
      }
    });
  }
}

/* ─── EXPORT INVENTORY CSV ───────────────────────────────────── */
function exportInventoryCSV() {
  const rows = document.querySelectorAll('.inv-table tbody tr');
  if (!rows.length) { alert('No data to export.'); return; }
  const headers = ['#', 'Month', 'Unique Restaurant IDs', 'MoM Change', 'Cumulative Total'];
  const csvRows = [headers.join(',')];
  rows.forEach(tr => {
    const cells = [...tr.querySelectorAll('td')].map(td => {
      const v = td.textContent.trim().replace(/"/g, '""').replace(/\n/g, ' ');
      return v.includes(',') ? '"' + v + '"' : v;
    });
    if (cells.length) csvRows.push(cells.join(','));
  });
  const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'inventory_restaurants_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
}

/* ─── BOOT ───────────────────────────────────────────────────── */
loadData();
</script>
</body>
